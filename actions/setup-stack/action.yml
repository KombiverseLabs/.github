name: "Setup Stack"
description: "Configures Go, Bun, Node and Docker BuildX with consistent caches and lockfile-aware keys for kombify CI jobs."

inputs:
  go:
    description: "Go version (e.g. 1.26 or 'mod' to read from go.mod). Empty = skip Go setup."
    required: false
    default: ""
  bun:
    description: "Bun version (e.g. 1.3.13). Empty = skip Bun setup."
    required: false
    default: ""
  node:
    description: "Node version (e.g. 22). Empty = skip Node setup."
    required: false
    default: ""
  pnpm:
    description: "Enable pnpm cache (set to 'true'). Requires node input."
    required: false
    default: "false"
  docker:
    description: "Set to 'true' to setup docker buildx with GHA cache hints."
    required: false
    default: "false"
  cache-key-suffix:
    description: "Extra suffix to scope caches per job (e.g. github.job)."
    required: false
    default: ""
  install-doppler:
    description: "Set to 'true' to install Doppler CLI."
    required: false
    default: "false"

outputs:
  go-version:
    description: "Resolved Go version (if installed)"
    value: ${{ steps.go-resolve.outputs.version }}
  cache-key:
    description: "Composite cache key prefix used for additional manual caches"
    value: kombify-${{ github.repository }}-${{ inputs.cache-key-suffix }}-${{ github.run_id }}

runs:
  using: "composite"
  steps:
    - name: Resolve Go version
      id: go-resolve
      if: inputs.go != ''
      shell: bash
      run: |
        if [ "${{ inputs.go }}" = "mod" ]; then
          if [ ! -f go.mod ]; then
            echo "::error::go: 'mod' requested but no go.mod found in $(pwd)"
            exit 1
          fi
          version="$(grep -E '^go ' go.mod | awk '{print $2}')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
        else
          echo "version=${{ inputs.go }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Go
      if: inputs.go != ''
      uses: actions/setup-go@v5
      with:
        go-version: ${{ steps.go-resolve.outputs.version }}
        cache: true
        cache-dependency-path: |
          **/go.sum
          **/go.mod

    - name: Setup Bun
      if: inputs.bun != ''
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun }}

    - name: Setup Node
      if: inputs.node != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node }}
        cache: ${{ inputs.pnpm == 'true' && 'pnpm' || 'npm' }}
        cache-dependency-path: |
          **/package-lock.json
          **/pnpm-lock.yaml
          **/yarn.lock

    - name: Setup Docker BuildX
      if: inputs.docker == 'true'
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          image=moby/buildkit:latest

    - name: Install Doppler CLI
      if: inputs.install-doppler == 'true'
      shell: bash
      run: |
        if command -v doppler >/dev/null 2>&1; then
          echo "Doppler CLI already installed: $(doppler --version)"
          exit 0
        fi
        sudo mkdir -p /usr/share/keyrings
        curl -sLf --retry 3 --tlsv1.2 --proto "=https" \
          'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' \
          | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] https://packages.doppler.com/public/cli/deb/debian any-version main" \
          | sudo tee /etc/apt/sources.list.d/doppler-cli.list >/dev/null
        sudo apt-get update -qq
        sudo apt-get install -y doppler
        doppler --version

    - name: Summary
      shell: bash
      run: |
        {
          echo "### setup-stack"
          [ -n "${{ inputs.go }}" ] && echo "- **Go:** ${{ steps.go-resolve.outputs.version }}"
          [ -n "${{ inputs.bun }}" ] && echo "- **Bun:** ${{ inputs.bun }}"
          [ -n "${{ inputs.node }}" ] && echo "- **Node:** ${{ inputs.node }} (cache: ${{ inputs.pnpm == 'true' && 'pnpm' || 'npm' }})"
          [ "${{ inputs.docker }}" = "true" ] && echo "- **Docker:** BuildX ready"
          [ "${{ inputs.install-doppler }}" = "true" ] && echo "- **Doppler:** installed"
          echo ""
        } >> "$GITHUB_STEP_SUMMARY"
