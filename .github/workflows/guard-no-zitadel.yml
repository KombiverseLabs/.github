name: Guard - No Zitadel (Reusable v2)
# Reusable guard workflow: fails when active paths contain "zitadel".
# Zitadel was replaced by Auth0 (cutover 2026-04-15).
#
# Standard reference: kombify Core/standards/DEPLOYMENT-STANDARD.md §3.1
#
# v2 changes (2026-04-27):
#   - Use Blacksmith runner via vars.CI_RUNNER (was: ubuntu-latest)
#   - Inputs for file-types and additional excludes
#   - Caller is expected to supply paths: filter (per-repo guard caller)
#
# Caller usage (replaces per-repo guard-no-zitadel.yml):
#
#   name: Guard - No Zitadel
#   on:
#     push:
#       branches: [main]
#       paths:
#         - "**/*.go"
#         - "**/*.ts"
#         - "**/*.svelte"
#         - "**/*.yml"
#         - "**/*.yaml"
#         - "**/*.json"
#         - "**/*.md"
#     pull_request:
#       paths: [same list as above]
#   jobs:
#     guard:
#       uses: KombiverseLabs/.github/.github/workflows/guard-no-zitadel.yml@main
#
# Kritischer Pfad: scan (3) = 3 min max

on:
  workflow_call:
    inputs:
      additional-excludes:
        description: "Newline-separated extra grep -v patterns (in addition to defaults)"
        required: false
        type: string
        default: ""
      file-types:
        description: "Comma-separated --include patterns (default covers Go, TS, Svelte, configs, MD)"
        required: false
        type: string
        default: "*.go,*.ts,*.tsx,*.svelte,*.yml,*.yaml,*.json,*.md"
      runner:
        description: "Runner label override"
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: Check no Zitadel references
    runs-on: ${{ inputs.runner != '' && inputs.runner || (vars.CI_RUNNER || 'blacksmith-2vcpu-ubuntu-2204') }}
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Scan for Zitadel references
        env:
          FILE_TYPES: ${{ inputs.file-types }}
          ADDITIONAL_EXCLUDES: ${{ inputs.additional-excludes }}
        run: |
          set -euo pipefail

          # Build --include args from comma-separated FILE_TYPES
          INCLUDE_ARGS=""
          IFS=',' read -ra TYPES <<<"$FILE_TYPES"
          for t in "${TYPES[@]}"; do
            t_trimmed="$(echo "$t" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            [ -z "$t_trimmed" ] && continue
            INCLUDE_ARGS="$INCLUDE_ARGS --include=$t_trimmed"
          done

          # Default exclude patterns
          DEFAULT_EXCLUDES=(
            "vendor/"
            "node_modules/"
            ".git/"
            "_archive/"
            "guard-no-zitadel"
            "check-no-zitadel"
            "audits/"
            "AUDIT-"
            "auth0-cutover"
            "architecture-drift"
            "agile-drifting-fog"
            "IDENTITY-PLATFORM.md"
            "DEPLOYMENT-AUDIT-"
          )

          # Run grep, capture file list, then filter via grep -v chain
          # shellcheck disable=SC2086
          RAW=$(grep -ri "zitadel" . $INCLUDE_ARGS -l 2>/dev/null || true)

          # Apply default + user excludes by piping through fixed-string filters
          FOUND="$RAW"
          for p in "${DEFAULT_EXCLUDES[@]}"; do
            FOUND=$(printf '%s\n' "$FOUND" | grep -v -F "$p" || true)
          done
          if [ -n "$ADDITIONAL_EXCLUDES" ]; then
            while IFS= read -r p; do
              p_trimmed="$(echo "$p" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
              [ -z "$p_trimmed" ] && continue
              FOUND=$(printf '%s\n' "$FOUND" | grep -v -F "$p_trimmed" || true)
            done <<<"$ADDITIONAL_EXCLUDES"
          fi

          # Strip empty lines
          FOUND=$(printf '%s\n' "$FOUND" | sed '/^$/d' || true)

          if [ -n "$FOUND" ]; then
            echo "::error::Zitadel references found in active paths"
            printf '%s\n' "$FOUND"
            echo ""
            echo "Zitadel was replaced by Auth0 (cutover 2026-04-15). Remove these references before merging."
            exit 1
          fi

          echo "OK: No Zitadel references found in active paths."
