# Reusable workflow: Deploy to Coolify (SaaS)
# Fetches env vars from Doppler, syncs to Coolify, then triggers redeploy.
# Supports both application and service resource types.
name: Deploy to Coolify

on:
  workflow_call:
    inputs:
      resource-uuid:
        description: 'Coolify resource UUID (application or service)'
        required: true
        type: string
      resource-type:
        description: 'Coolify resource type: application or service'
        required: false
        type: string
        default: 'application'
      image-tag:
        description: 'Docker image tag to deploy'
        required: false
        type: string
        default: 'latest'
      health-check-url:
        description: 'URL to verify after deployment (empty to skip)'
        required: false
        type: string
        default: ''
      force:
        description: 'Force rebuild even if no changes'
        required: false
        type: boolean
        default: false
    secrets:
      DOPPLER_TOKEN:
        description: 'Doppler service token for this application'
        required: true
      COOLIFY_API_TOKEN:
        description: 'Coolify API token'
        required: true

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install Doppler CLI
        run: |
          curl -sLf --retry 3 --tlsv1.2 --proto "=https" \
            'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' \
            | sudo gpg --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] \
            https://packages.doppler.com/public/cli/deb/debian any-version main" \
            | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          sudo apt-get update -qq && sudo apt-get install -y doppler

      - name: Sync env vars from Doppler to Coolify
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          RESOURCE_UUID: ${{ inputs.resource-uuid }}
          RESOURCE_TYPE: ${{ inputs.resource-type }}
        run: |
          # Download secrets from Doppler as JSON (excluding DOPPLER_* meta vars)
          SECRETS_JSON=$(doppler secrets download --no-file --format json \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          # Filter out Doppler meta keys and resource UUID (Coolify-internal)
          skip = {'DOPPLER_PROJECT','DOPPLER_CONFIG','DOPPLER_ENVIRONMENT','COOLIFY_RESOURCE_UUID'}
          result = [{'key': k, 'value': v, 'is_preview': False, 'is_build_time': False}
                    for k, v in d.items() if k not in skip]
          print(json.dumps({'data': result}))
          ")

          if [ "$RESOURCE_TYPE" = "application" ]; then
            ENDPOINT="https://app.coolify.io/api/v1/applications/${RESOURCE_UUID}/envs/bulk"
          else
            ENDPOINT="https://app.coolify.io/api/v1/services/${RESOURCE_UUID}/envs/bulk"
          fi

          HTTP_CODE=$(curl -s -o /tmp/coolify_sync.json -w "%{http_code}" \
            -X POST "$ENDPOINT" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$SECRETS_JSON")

          cat /tmp/coolify_sync.json
          echo ""
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "❌ Failed to sync env vars (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Synced $(echo "$SECRETS_JSON" | python3 -c "import sys,json; print(len(json.load(sys.stdin)['data']))") env vars to Coolify"

      - name: Update image tag
        if: inputs.image-tag != 'latest'
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          RESOURCE_UUID: ${{ inputs.resource-uuid }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          curl -s -X PATCH "https://app.coolify.io/api/v1/applications/${RESOURCE_UUID}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"docker_registry_image_tag\": \"${IMAGE_TAG}\"}" | python3 -m json.tool

      - name: Trigger Coolify deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          RESOURCE_UUID: ${{ inputs.resource-uuid }}
          FORCE: ${{ inputs.force }}
        run: |
          FORCE_FLAG=$([ "$FORCE" = "true" ] && echo "true" || echo "false")
          RESP=$(curl -s "https://app.coolify.io/api/v1/deploy?uuid=${RESOURCE_UUID}&force=${FORCE_FLAG}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}")
          echo "$RESP" | python3 -m json.tool
          DEPLOY_UUID=$(echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          deps = d.get('deployments', [{}])
          print(deps[0].get('deployment_uuid', ''))
          " 2>/dev/null)
          echo "deployment_uuid=${DEPLOY_UUID}" >> $GITHUB_OUTPUT
        id: deploy

      - name: Wait for deployment to complete
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          DEPLOY_UUID: ${{ steps.deploy.outputs.deployment_uuid }}
        run: |
          if [ -z "$DEPLOY_UUID" ]; then
            echo "No deployment UUID, skipping wait"
            exit 0
          fi
          echo "Waiting for deployment ${DEPLOY_UUID}..."
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(curl -s "https://app.coolify.io/api/v1/deployments/${DEPLOY_UUID}" \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null)
            echo "  [${i}] status: $STATUS"
            case "$STATUS" in
              finished|running:healthy) echo "✅ Deployed successfully"; exit 0 ;;
              error|failed)             echo "❌ Deployment failed";      exit 1 ;;
            esac
          done
          echo "⚠️  Deployment still in progress after 5 minutes"

      - name: Health check
        if: inputs.health-check-url != ''
        run: |
          echo "Checking ${{ inputs.health-check-url }}..."
          for i in 1 2 3 4 5; do
            CODE=$(curl -sk -o /dev/null -w "%{http_code}" "${{ inputs.health-check-url }}" --max-time 15)
            echo "  Attempt $i: HTTP $CODE"
            if [ "$CODE" -lt 400 ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "### Coolify Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource** | \`${{ inputs.resource-uuid }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | ${{ inputs.resource-type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ inputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
