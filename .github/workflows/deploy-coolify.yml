# Reusable workflow: Deploy to Coolify (SaaS)
# Triggers a deployment against an already-configured Coolify resource.
# GitHub builds the image with the required config baked in; this workflow
# must not write app env vars into Coolify.
#
# Secret requirements:
# - Prefer passing COOLIFY_API_TOKEN directly from GitHub.
# - DEPLOY_DOPPLER_TOKEN remains supported only to resolve Coolify credentials
#   and/or resource UUIDs when a caller does not pass them explicitly.
name: Deploy to Coolify

on:
  workflow_call:
    inputs:
      resource-uuid:
        description: 'Optional explicit Coolify resource UUID override.'
        required: false
        type: string
      resource-secret-name:
        description: 'Doppler secret name that contains the Coolify resource UUID.'
        required: false
        type: string
        default: 'COOLIFY_RESOURCE_UUID'
      resource-type:
        description: 'Coolify resource type: application or service'
        required: false
        type: string
        default: 'service'
      image-tag:
        description: 'Docker image tag to deploy'
        required: false
        type: string
        default: 'latest'
      image-repository:
        description: 'Docker image repository to deploy (defaults to ghcr.io/<owner>/<repo>)'
        required: false
        type: string
        default: ''
      health-check-url:
        description: 'URL to verify after deployment (empty to skip)'
        required: false
        type: string
        default: ''
      force:
        description: 'Force rebuild even if no changes'
        required: false
        type: boolean
        default: true
      runner:
        description: 'Runner label to execute the deployment on'
        required: false
        type: string
        default: 'blacksmith-4vcpu-ubuntu-2204'
      sync-multiline-secrets:
        description: 'Whether to sync multiline Doppler secrets into Coolify envs'
        required: false
        type: boolean
        default: false
      env-allowlist:
        description: 'Optional comma- or newline-separated list of env keys to sync. Empty means sync all non-skipped keys.'
        required: false
        type: string
        default: ''
      prune-unmanaged-envs:
        description: 'Delete Coolify env keys that are not present in Doppler after sync'
        required: false
        type: boolean
        default: false
    secrets:
      DOPPLER_TOKEN:
        description: 'Optional Doppler token for runtime env synchronization into Coolify'
        required: false
      COOLIFY_API_TOKEN:
        description: 'Coolify API token (preferred source; GitHub secret)'
        required: false
      DEPLOY_DOPPLER_TOKEN:
        description: 'Optional Doppler token used only to resolve Coolify credentials and/or resource UUIDs'
        required: false

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 3

    steps:
      - name: Free runner disk space
        run: |
          df -h
          docker system df || true
          docker builder prune -af || true
          docker image prune -af || true
          docker container prune -f || true
          docker volume prune -f || true
          df -h

      - name: Install Doppler CLI
        env:
          INPUT_COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          DEPLOY_DOPPLER_TOKEN: ${{ secrets.DEPLOY_DOPPLER_TOKEN }}
          INPUT_RESOURCE_UUID: ${{ inputs.resource-uuid }}
        run: |
          if [ -n "$INPUT_RESOURCE_UUID" ] && [ -n "$INPUT_COOLIFY_API_TOKEN" ]; then
            echo "Skipping Doppler install; resource UUID and Coolify token were provided directly."
            exit 0
          fi

          if [ -z "$DEPLOY_DOPPLER_TOKEN" ]; then
            echo "Skipping Doppler install; no DEPLOY_DOPPLER_TOKEN was provided."
            exit 0
          fi

          if command -v doppler >/dev/null 2>&1; then
            doppler --version
            exit 0
          fi

          sudo mkdir -p /usr/share/keyrings
          if [ ! -f /usr/share/keyrings/doppler-archive-keyring.gpg ]; then
            curl -sLf --retry 3 --tlsv1.2 --proto "=https" \
              'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' \
              | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
          fi
          if [ ! -f /etc/apt/sources.list.d/doppler-cli.list ]; then
            echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] \
              https://packages.doppler.com/public/cli/deb/debian any-version main" \
              | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          fi

          for attempt in 1 2 3 4 5; do
            if sudo apt-get update -qq && sudo apt-get install -y doppler; then
              doppler --version
              exit 0
            fi
            echo "apt-get attempt ${attempt} failed; retrying in 10s"
            sleep 10
          done
          exit 1

      - name: Resolve Coolify resource UUID
        id: resolved-resource-uuid
        env:
          INPUT_COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          DEPLOY_DOPPLER_TOKEN: ${{ secrets.DEPLOY_DOPPLER_TOKEN }}
          INPUT_RESOURCE_UUID: ${{ inputs.resource-uuid }}
          RESOURCE_SECRET_NAME: ${{ inputs.resource-secret-name }}
        run: |
          if [ -n "$INPUT_RESOURCE_UUID" ] && [ -n "$INPUT_COOLIFY_API_TOKEN" ]; then
            echo "::add-mask::$INPUT_RESOURCE_UUID"
            echo "::add-mask::$INPUT_COOLIFY_API_TOKEN"
            {
              echo "resource_uuid=$INPUT_RESOURCE_UUID"
              echo "coolify_api_token=$INPUT_COOLIFY_API_TOKEN"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$DEPLOY_DOPPLER_TOKEN" ]; then
            echo "DEPLOY_DOPPLER_TOKEN is required when resource-uuid or COOLIFY_API_TOKEN is not provided directly" >&2
            exit 1
          fi

          DOPPLER_TOKEN="$DEPLOY_DOPPLER_TOKEN" doppler secrets download --no-file --format json > /tmp/deploy_doppler_secrets.json

          python3 << 'PYEOF'
          import json
          import os
          import sys

          input_uuid = os.environ.get('INPUT_RESOURCE_UUID', '').strip()
          input_token = os.environ.get('INPUT_COOLIFY_API_TOKEN', '').strip()
          resource_secret_name = os.environ.get('RESOURCE_SECRET_NAME', 'COOLIFY_RESOURCE_UUID').strip() or 'COOLIFY_RESOURCE_UUID'
          with open('/tmp/deploy_doppler_secrets.json', 'r', encoding='utf-8') as handle:
              secret_map = json.load(handle)

          resolved_uuid = input_uuid or str(secret_map.get(resource_secret_name, '')).strip()
          if not resolved_uuid:
              print(
                  f'Coolify resource UUID is required. Provide workflow input resource-uuid or set '
                  f'{resource_secret_name} in the deploy Doppler project.',
                  file=sys.stderr,
              )
              raise SystemExit(1)

          coolify_api_token = input_token or str(
              secret_map.get('COOLIFY_API_TOKEN', '') or secret_map.get('COOLIFY_API_KEY', '')
          ).strip()
          if not coolify_api_token:
              print(
                  'Coolify API token is required. Pass COOLIFY_API_TOKEN as a GitHub secret or set '
                  'COOLIFY_API_TOKEN / COOLIFY_API_KEY in the deploy Doppler project.',
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(f'::add-mask::{resolved_uuid}')
          print(f'::add-mask::{coolify_api_token}')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              print(f'resource_uuid={resolved_uuid}', file=handle)
              print(f'coolify_api_token={coolify_api_token}', file=handle)
          PYEOF

      - name: Sync env vars from Doppler to Coolify
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          COOLIFY_TOKEN: ${{ steps.resolved-resource-uuid.outputs.coolify_api_token }}
          RESOURCE_UUID: ${{ steps.resolved-resource-uuid.outputs.resource_uuid }}
          RESOURCE_TYPE: ${{ inputs.resource-type }}
          SYNC_MULTILINE_SECRETS: ${{ inputs.sync-multiline-secrets }}
          ENV_ALLOWLIST: ${{ inputs.env-allowlist }}
          PRUNE_UNMANAGED_ENVS: ${{ inputs.prune-unmanaged-envs }}
        run: |
          # Download secrets from Doppler and upsert each into Coolify one by one.
          # Coolify Cloud SaaS doesn't support /envs/bulk; use POST (create) / DELETE+POST (update).
          if [ ! -f /tmp/app_doppler_secrets.json ]; then
            doppler secrets download --no-file --format json > /tmp/app_doppler_secrets.json
          fi

          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os

          token = os.environ['COOLIFY_TOKEN']
          uuid = os.environ['RESOURCE_UUID']
          rtype = os.environ.get('RESOURCE_TYPE', 'application')
          sync_multiline = os.environ.get('SYNC_MULTILINE_SECRETS', 'false').lower() == 'true'
          raw_allowlist = os.environ.get('ENV_ALLOWLIST', '')
          prune_unmanaged = os.environ.get('PRUNE_UNMANAGED_ENVS', 'false').lower() == 'true'
          allowlist = {
              item.strip()
              for chunk in raw_allowlist.splitlines()
              for item in chunk.split(',')
              if item.strip()
          }
          base = 'https://app.coolify.io/api/v1'
          headers = {
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'User-Agent': 'Coolify-Deploy/1.0',
          }
          skip = {
              'DOPPLER_CONFIG',
              'DOPPLER_ENVIRONMENT',
              'DOPPLER_PROJECT',
              'ZITADEL_ADMIN_TOKEN',
              'ZITADEL_MANAGEMENT_TOKEN',
              'ZITADEL_SERVICE_PAT',
          }

          with open('/tmp/app_doppler_secrets.json') as f:
              desired = {}
              skipped_multiline = set()
              for key, raw_value in json.load(f).items():
                  if (
                      key in skip
                      or key in {'COOLIFY_API_TOKEN', 'COOLIFY_API_KEY', 'COOLIFY_RESOURCE_UUID'}
                      or key.endswith('_RESOURCE_UUID')
                  ):
                      continue
                  if allowlist and key not in allowlist:
                      continue
                  value = str(raw_value)
                  is_multiline = '\n' in value or '\r' in value
                  if is_multiline and not sync_multiline:
                      skipped_multiline.add(key)
                      continue
                  desired[key] = {
                      'value': value,
                      'is_multiline': is_multiline,
                      'is_literal': is_multiline,
                  }

          def api(method, path, body=None):
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(f'{base}/{path}', data=data, method=method, headers=headers)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read() or b'{}'), None
              except urllib.error.HTTPError as e:
                  return None, (e.code, e.read().decode()[:300])

          current_list, err = api('GET', f'{rtype}s/{uuid}/envs')
          if err:
              print(f'ERROR fetching envs: {err}')
              raise SystemExit(1)
          current = {}
          for entry in current_list:
              key = entry['key']
              current.setdefault(key, []).append({
                  'uuid': entry['uuid'],
                  'value': entry.get('value', ''),
                  'is_multiline': bool(entry.get('is_multiline', False)),
                  'is_literal': bool(entry.get('is_literal', False)),
              })

          def delete_all(entries):
              for item in entries:
                  api('DELETE', f'{rtype}s/{uuid}/envs/{item["uuid"]}')

          removed_multiline = 0
          for key in sorted(skipped_multiline):
              if key not in current:
                  continue
              delete_all(current[key])
              removed_multiline += 1

          pruned = duplicate_repairs = created = updated = skipped = multiline = 0
          for key, spec in desired.items():
              payload = {
                  'key': key,
                  'value': spec['value'],
                  'is_multiline': spec['is_multiline'],
                  'is_literal': spec['is_literal'],
              }
              if spec['is_multiline']:
                  multiline += 1
              existing_entries = current.get(key, [])
              if existing_entries:
                  same_value = (
                      len(existing_entries) == 1
                      and existing_entries[0]['value'] == spec['value']
                      and existing_entries[0]['is_multiline'] == spec['is_multiline']
                      and existing_entries[0]['is_literal'] == spec['is_literal']
                  )
                  if same_value:
                      skipped += 1
                      continue
                  if len(existing_entries) > 1:
                      duplicate_repairs += len(existing_entries) - 1
                  delete_all(existing_entries)
                  r, err = api('POST', f'{rtype}s/{uuid}/envs', payload)
                  if err:
                      print(f'  FAIL {key}: {err}')
                  else:
                      updated += 1
              else:
                  r, err = api('POST', f'{rtype}s/{uuid}/envs', payload)
                  if err and err[0] == 409:
                      skipped += 1  # already exists with same value
                  elif err:
                      print(f'  FAIL {key}: {err}')
                  else:
                      created += 1

          if prune_unmanaged:
              for key, entries in current.items():
                  if key in desired or key in skipped_multiline or key in skip:
                      continue
                  delete_all(entries)
                  pruned += len(entries)

          if skipped_multiline:
              print(f'⚠️ Skipped multiline secrets: {", ".join(sorted(skipped_multiline))}')
          print(
              f'✅ Env sync complete: {created} created, {updated} updated, {skipped} unchanged, '
              f'{multiline} multiline synced, {removed_multiline} multiline removed, '
              f'{duplicate_repairs} duplicate entries repaired, {pruned} unmanaged entries pruned'
          )
          PYEOF
      - name: Update image tag
        if: inputs.image-tag != 'latest'
        env:
          COOLIFY_TOKEN: ${{ steps.resolved-resource-uuid.outputs.coolify_api_token }}
          RESOURCE_UUID: ${{ steps.resolved-resource-uuid.outputs.resource_uuid }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          IMAGE_REPOSITORY: ${{ inputs.image-repository }}
          RESOURCE_TYPE: ${{ inputs.resource-type }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import re
          import urllib.request

          token = os.environ['COOLIFY_TOKEN']
          uuid = os.environ['RESOURCE_UUID']
          raw_image_ref = os.environ['IMAGE_TAG'].strip()
          image_tag = raw_image_ref
          image_repository = os.environ.get('IMAGE_REPOSITORY', '').strip().lower()
          resource_type = os.environ.get('RESOURCE_TYPE', 'service')
          github_repository = os.environ.get('GITHUB_REPOSITORY', '').strip().lower()
          base = 'https://app.coolify.io/api/v1'
          headers = {
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'User-Agent': 'Coolify-Deploy/1.0',
          }

          if not image_repository and raw_image_ref and '@' not in raw_image_ref and '/' in raw_image_ref and ':' in raw_image_ref:
              candidate_repository, candidate_tag = raw_image_ref.rsplit(':', 1)
              if candidate_repository and candidate_tag:
                  image_repository = candidate_repository.lower()
                  image_tag = candidate_tag

          if not image_repository and '/' in github_repository:
              owner, repo = github_repository.split('/', 1)
              image_repository = f'ghcr.io/{owner}/{repo.lower()}'

          def request(method, path, payload=None):
              data = json.dumps(payload).encode() if payload is not None else None
              req = urllib.request.Request(f'{base}/{path}', data=data, method=method, headers=headers)
              with urllib.request.urlopen(req) as response:
                  return json.loads(response.read() or b'{}')

          if resource_type == 'application':
              payload = {'docker_registry_image_tag': image_tag}
              if image_repository:
                  payload['docker_registry_image_name'] = image_repository
              result = request('PATCH', f'applications/{uuid}', payload)
              print(json.dumps(result, indent=2))
              raise SystemExit(0)

          if resource_type != 'service':
              raise SystemExit(f'unsupported resource type for image tag update: {resource_type}')

          current = request('GET', f'services/{uuid}')
          compose = current.get('docker_compose_raw') or current.get('docker_compose')
          if not compose:
              raise SystemExit('service is missing docker_compose_raw/docker_compose; cannot update image tag')

          image_line = re.compile(
              r'^(?P<prefix>\s*image:\s*)(?P<image>[^@\s#]+?)(?::(?P<tag>[^@\s#]+))?(?P<suffix>\s*(?:#.*)?)$',
              re.MULTILINE,
          )

          replace_state = {'count': 0}

          def replace(match):
              image_ref = match.group('image')
              tag = match.group('tag')
              suffix = match.group('suffix') or ''
              if image_ref.startswith('${') or (tag and tag.startswith('${')):
                  return match.group(0)
              if image_repository and image_ref.lower() != image_repository:
                  return match.group(0)
              replace_state['count'] += 1
              return f"{match.group('prefix')}{image_ref}:{image_tag}{suffix}"

          updated = image_line.sub(replace, compose)
          if replace_state['count'] == 0:
              print(
                  'no static image lines found in service docker compose; '
                  'skipping image tag mutation and relying on the configured service image source'
              )
              raise SystemExit(0)
          if updated == compose:
              print('service docker compose already uses requested image tag')
              raise SystemExit(0)

          result = request('PATCH', f'services/{uuid}', {'docker_compose_raw': updated})
          print(json.dumps(result, indent=2))
          PYEOF

      - name: Trigger Coolify deployment
        id: deploy
        env:
          COOLIFY_TOKEN: ${{ steps.resolved-resource-uuid.outputs.coolify_api_token }}
          RESOURCE_UUID: ${{ steps.resolved-resource-uuid.outputs.resource_uuid }}
          FORCE: ${{ inputs.force }}
        run: |
          FORCE_FLAG=$([ "$FORCE" = "true" ] && echo "true" || echo "false")
          RESP=$(curl -s "https://app.coolify.io/api/v1/deploy?uuid=${RESOURCE_UUID}&force=${FORCE_FLAG}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}")
          echo "Deploy response: $RESP"
          DEPLOY_UUID=$(echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          deps = d.get('deployments', [{}])
          print(deps[0].get('deployment_uuid', ''))
          " 2>/dev/null || true)
          echo "deployment_uuid=${DEPLOY_UUID}" >> $GITHUB_OUTPUT

      - name: Wait for Coolify deployment state
        id: wait-for-deploy
        env:
          COOLIFY_TOKEN: ${{ steps.resolved-resource-uuid.outputs.coolify_api_token }}
          RESOURCE_UUID: ${{ steps.resolved-resource-uuid.outputs.resource_uuid }}
          RESOURCE_TYPE: ${{ inputs.resource-type }}
          DEPLOY_UUID: ${{ steps.deploy.outputs.deployment_uuid }}
          HEALTH_CHECK_URL: ${{ inputs.health-check-url }}
        run: |
          echo "Waiting 3s for Coolify to register the deployment..."
          sleep 3

          if [ -n "$DEPLOY_UUID" ]; then
            for i in $(seq 1 18); do
              sleep 5
              STATUS=$(curl -s "https://app.coolify.io/api/v1/deployments/${DEPLOY_UUID}" \
                -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")
              echo "  [${i}] deployment status: $STATUS"
              echo "last_status=${STATUS}" >> "$GITHUB_OUTPUT"
              case "$STATUS" in
                finished) echo "✅ Deployment complete"; exit 0 ;;
                error|failed) echo "❌ Deployment failed"; exit 1 ;;
              esac
            done
          else
            for i in $(seq 1 18); do
              sleep 5
              STATUS=$(curl -s "https://app.coolify.io/api/v1/services/${RESOURCE_UUID}" \
                -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")
              echo "  [${i}] service status: $STATUS"
              echo "last_status=${STATUS}" >> "$GITHUB_OUTPUT"
              case "$STATUS" in
                running*) echo "✅ Service is running"; exit 0 ;;
                exited|error) echo "❌ Service failed to start"; exit 1 ;;
              esac
            done
          fi

          echo "wait_timed_out=true" >> "$GITHUB_OUTPUT"
          if [ -n "$HEALTH_CHECK_URL" ]; then
            echo "⚠️  Coolify did not report a ready state in time; continuing to HTTP health check"
          else
            echo "⚠️  Coolify did not report a ready state in time and no HTTP health check was configured"
          fi

      - name: Show Coolify resource state
        if: always()
        env:
          COOLIFY_TOKEN: ${{ steps.resolved-resource-uuid.outputs.coolify_api_token }}
          RESOURCE_UUID: ${{ steps.resolved-resource-uuid.outputs.resource_uuid }}
          RESOURCE_TYPE: ${{ inputs.resource-type }}
          DEPLOY_UUID: ${{ steps.deploy.outputs.deployment_uuid }}
        run: |
          if [ -n "$DEPLOY_UUID" ]; then
            echo "=== Deployment payload ==="
            curl -s "https://app.coolify.io/api/v1/deployments/${DEPLOY_UUID}" \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              | python3 -m json.tool || true
          fi

          if [ "$RESOURCE_TYPE" = "application" ]; then
            echo "=== Application payload ==="
            curl -s "https://app.coolify.io/api/v1/applications/${RESOURCE_UUID}" \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              | python3 -m json.tool || true
          else
            echo "=== Service payload ==="
            curl -s "https://app.coolify.io/api/v1/services/${RESOURCE_UUID}" \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              | python3 -m json.tool || true
          fi

      - name: Health check
        if: inputs.health-check-url != '' && success()
        run: |
          echo "Checking ${{ inputs.health-check-url }}..."
          for i in 1 2 3; do
            CODE=$(curl -sk -o /dev/null -w "%{http_code}" "${{ inputs.health-check-url }}" --max-time 10)
            echo "  Attempt $i: HTTP $CODE"
            if [ "$CODE" -lt 400 ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Health check failed"
          exit 1

      - name: Enforce deploy readiness without HTTP probe
        if: inputs.health-check-url == '' && steps.wait-for-deploy.outputs.wait_timed_out == 'true'
        run: |
          echo "❌ Coolify did not report a ready state before timeout and no HTTP probe is configured"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "### Coolify Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource** | \`${{ steps.resolved-resource-uuid.outputs.resource_uuid }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | ${{ inputs.resource-type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ inputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Wait Timed Out** | ${{ steps.wait-for-deploy.outputs.wait_timed_out || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Last Coolify Status** | \`${{ steps.wait-for-deploy.outputs.last_status || 'unknown' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
