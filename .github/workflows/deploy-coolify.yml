# Reusable workflow: Deploy to Coolify (SaaS)
# Fetches env vars from Doppler, syncs to Coolify, then triggers redeploy.
# Supports both application and service resource types.
#
# Secret requirements (set at repo level — see docs/CI_CD.md):
#   DOPPLER_TOKEN     — project-scoped service token (read-only)
#   COOLIFY_API_TOKEN — Coolify API key (org-level GitHub secret)
name: Deploy to Coolify

on:
  workflow_call:
    inputs:
      resource-uuid:
        description: 'Coolify resource UUID (application or service). Optional when COOLIFY_RESOURCE_UUID is available via Doppler.'
        required: false
        type: string
      resource-type:
        description: 'Coolify resource type: application or service'
        required: false
        type: string
        default: 'service'
      image-tag:
        description: 'Docker image tag to deploy'
        required: false
        type: string
        default: 'latest'
      health-check-url:
        description: 'URL to verify after deployment (empty to skip)'
        required: false
        type: string
        default: ''
      force:
        description: 'Force rebuild even if no changes'
        required: false
        type: boolean
        default: true
      runner:
        description: 'Runner label to execute the deployment on'
        required: false
        type: string
        default: 'srv1161760-labs'
    secrets:
      DOPPLER_TOKEN:
        description: 'Doppler project service token (read-only, project-scoped)'
        required: true
      COOLIFY_API_TOKEN:
        description: 'Coolify API token (org-level secret: COOLIFY_API_TOKEN)'
        required: true

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 3

    steps:
      - name: Install Doppler CLI
        run: |
          sudo mkdir -p /usr/share/keyrings
          curl -sLf --retry 3 --tlsv1.2 --proto "=https" \
            'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' \
            | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] \
            https://packages.doppler.com/public/cli/deb/debian any-version main" \
            | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          sudo apt-get update -qq && sudo apt-get install -y doppler

      - name: Resolve Coolify resource UUID
        id: resolved-resource-uuid
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          INPUT_RESOURCE_UUID: ${{ inputs.resource-uuid }}
        run: |
          doppler secrets download --no-file --format json > /tmp/doppler_secrets.json

          python3 << 'PYEOF'
          import json
          import os
          import sys

          input_uuid = os.environ.get('INPUT_RESOURCE_UUID', '').strip()
          with open('/tmp/doppler_secrets.json', 'r', encoding='utf-8') as handle:
              secret_map = json.load(handle)

          resolved_uuid = input_uuid or str(secret_map.get('COOLIFY_RESOURCE_UUID', '')).strip()
          if not resolved_uuid:
              print('Coolify resource UUID is required. Provide workflow input resource-uuid or set COOLIFY_RESOURCE_UUID in Doppler.', file=sys.stderr)
              raise SystemExit(1)

          print(f'::add-mask::{resolved_uuid}')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              print(f'resource_uuid={resolved_uuid}', file=handle)
          PYEOF

      - name: Sync env vars from Doppler to Coolify
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          RESOURCE_UUID: ${{ steps.resolved-resource-uuid.outputs.resource_uuid }}
          RESOURCE_TYPE: ${{ inputs.resource-type }}
        run: |
          # Download secrets from Doppler and upsert each into Coolify one by one.
          # Coolify Cloud SaaS doesn't support /envs/bulk; use POST (create) / DELETE+POST (update).
          if [ ! -f /tmp/doppler_secrets.json ]; then
            doppler secrets download --no-file --format json > /tmp/doppler_secrets.json
          fi

          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os

          token = os.environ['COOLIFY_TOKEN']
          uuid = os.environ['RESOURCE_UUID']
          rtype = os.environ.get('RESOURCE_TYPE', 'application')
          base = 'https://app.coolify.io/api/v1'
          headers = {
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'User-Agent': 'Coolify-Deploy/1.0',
          }
          skip = {'DOPPLER_CONFIG', 'DOPPLER_ENVIRONMENT', 'DOPPLER_PROJECT', 'COOLIFY_RESOURCE_UUID'}

          with open('/tmp/doppler_secrets.json') as f:
              desired = {k: str(v) for k, v in json.load(f).items() if k not in skip}

          def api(method, path, body=None):
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(f'{base}/{path}', data=data, method=method, headers=headers)
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read() or b'{}'), None
              except urllib.error.HTTPError as e:
                  return None, (e.code, e.read().decode()[:300])

          current_list, err = api('GET', f'{rtype}s/{uuid}/envs')
          if err:
              print(f'ERROR fetching envs: {err}')
              raise SystemExit(1)
          current = {e['key']: {'uuid': e['uuid'], 'value': e.get('value', '')} for e in current_list}

          created = updated = skipped = 0
          for key, value in desired.items():
              if key in current:
                  if current[key]['value'] == value:
                      skipped += 1
                      continue
                  api('DELETE', f'{rtype}s/{uuid}/envs/{current[key]["uuid"]}')
                  r, err = api('POST', f'{rtype}s/{uuid}/envs', {'key': key, 'value': value})
                  if err:
                      print(f'  FAIL {key}: {err}')
                  else:
                      updated += 1
              else:
                  r, err = api('POST', f'{rtype}s/{uuid}/envs', {'key': key, 'value': value})
                  if err and err[0] == 409:
                      skipped += 1  # already exists with same value
                  elif err:
                      print(f'  FAIL {key}: {err}')
                  else:
                      created += 1

          print(f'✅ Env sync complete: {created} created, {updated} updated, {skipped} unchanged')
          PYEOF

      - name: Update image tag
        if: inputs.resource-type == 'application' && inputs.image-tag != 'latest'
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          RESOURCE_UUID: ${{ steps.resolved-resource-uuid.outputs.resource_uuid }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          curl -s -X PATCH "https://app.coolify.io/api/v1/applications/${RESOURCE_UUID}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"docker_registry_image_tag\": \"${IMAGE_TAG}\"}" | python3 -m json.tool

      - name: Trigger Coolify deployment
        id: deploy
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          RESOURCE_UUID: ${{ steps.resolved-resource-uuid.outputs.resource_uuid }}
          FORCE: ${{ inputs.force }}
        run: |
          FORCE_FLAG=$([ "$FORCE" = "true" ] && echo "true" || echo "false")
          RESP=$(curl -s "https://app.coolify.io/api/v1/deploy?uuid=${RESOURCE_UUID}&force=${FORCE_FLAG}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}")
          echo "Deploy response: $RESP"
          # Services return no deployment_uuid; that's OK — we wait via status check
          DEPLOY_UUID=$(echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          deps = d.get('deployments', [{}])
          print(deps[0].get('deployment_uuid', ''))
          " 2>/dev/null || true)
          echo "deployment_uuid=${DEPLOY_UUID}" >> $GITHUB_OUTPUT

      - name: Wait for service to become healthy
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          RESOURCE_UUID: ${{ steps.resolved-resource-uuid.outputs.resource_uuid }}
          RESOURCE_TYPE: ${{ inputs.resource-type }}
          DEPLOY_UUID: ${{ steps.deploy.outputs.deployment_uuid }}
        run: |
          echo "Waiting 3s for Coolify to register the deployment..."
          sleep 3

          # If we have a deployment UUID, poll it
          if [ -n "$DEPLOY_UUID" ]; then
            for i in $(seq 1 18); do
              sleep 5
              STATUS=$(curl -s "https://app.coolify.io/api/v1/deployments/${DEPLOY_UUID}" \
                -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")
              echo "  [${i}] deployment status: $STATUS"
              case "$STATUS" in
                finished) echo "✅ Deployment complete"; exit 0 ;;
                error|failed) echo "❌ Deployment failed"; exit 1 ;;
              esac
            done
          else
            # Service type: poll service status endpoint
            for i in $(seq 1 18); do
              sleep 5
              STATUS=$(curl -s "https://app.coolify.io/api/v1/services/${RESOURCE_UUID}" \
                -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null || echo "unknown")
              echo "  [${i}] service status: $STATUS"
              case "$STATUS" in
                running|running:healthy) echo "✅ Service is running"; exit 0 ;;
                exited|error) echo "❌ Service failed to start"; exit 1 ;;
              esac
            done
            echo "⚠️  Service status check timed out — check Coolify dashboard"
            exit 1
          fi

      - name: Health check
        if: inputs.health-check-url != ''
        run: |
          echo "Checking ${{ inputs.health-check-url }}..."
          for i in 1 2 3; do
            CODE=$(curl -sk -o /dev/null -w "%{http_code}" "${{ inputs.health-check-url }}" --max-time 10)
            echo "  Attempt $i: HTTP $CODE"
            if [ "$CODE" -lt 400 ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Health check failed"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "### Coolify Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Resource** | \`${{ steps.resolved-resource-uuid.outputs.resource_uuid }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | ${{ inputs.resource-type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ inputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
