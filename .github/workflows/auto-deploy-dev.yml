name: Auto-Deploy Dev (kombify.dev)
# Reusable workflow: builds the service image, pushes it to GHCR,
# and deploys it to the IONOS Dev VPS (kombify.dev) via Coolify-managed
# docker compose. Auto-triggered from the caller's push-on-main workflow.
#
# Standard reference: kombify Core/standards/DEPLOYMENT-STANDARD.md §2.3
#
# Caller usage (typical):
#   on:
#     push:
#       branches: [main]
#       paths: [internal/**, cmd/**, src/**, Dockerfile, ...]
#   jobs:
#     auto-deploy-dev:
#       uses: KombiverseLabs/.github/.github/workflows/auto-deploy-dev.yml@main
#       with:
#         service-name: kombify-blog
#         compose-service: blog
#         compose-dir: /data/coolify/applications/abc123
#         health-check-url: https://blog.kombify.dev/health
#       secrets:
#         GH_PAT: ${{ secrets.GH_PAT }}
#         DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
#         DEPLOY_DOPPLER_TOKEN: ${{ secrets.DEPLOY_DOPPLER_TOKEN }}
#
# Kritischer Pfad: build (15) + deploy (10) + smoke (5) = 30 min max

on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name for logging (e.g. kombify-blog)"
        required: true
        type: string
      image-name:
        description: "GHCR image name (defaults to service-name)"
        required: false
        type: string
        default: ""
      compose-service:
        description: "Docker Compose service name on the dev VPS"
        required: true
        type: string
      compose-dir:
        description: "Directory on dev VPS containing docker-compose.yml"
        required: true
        type: string
      compose-file-source:
        description: "Optional local compose file to upload before deployment"
        required: false
        type: string
        default: ""
      compose-file-destination:
        description: "Remote compose filename"
        required: false
        type: string
        default: "docker-compose.yml"
      dockerfile:
        description: "Path to Dockerfile (default: Dockerfile)"
        required: false
        type: string
        default: "Dockerfile"
      docker-context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      build-args:
        description: "Multiline KEY=VALUE build args"
        required: false
        type: string
        default: ""
      doppler-build-secrets:
        description: "Multiline list of Doppler secret names to expose as BuildKit secrets"
        required: false
        type: string
        default: ""
      platforms:
        description: "Target platforms (default: linux/amd64)"
        required: false
        type: string
        default: "linux/amd64"
      health-check-url:
        description: "URL to probe after deploy (e.g. https://blog.kombify.dev/health)"
        required: true
        type: string
      health-check-retries:
        description: "Max retries for health check"
        required: false
        type: number
        default: 12
      health-check-interval:
        description: "Seconds between health-check retries"
        required: false
        type: number
        default: 10
      smoke-expected-content:
        description: "Optional expected substring(s) in smoke response (comma-separated)"
        required: false
        type: string
        default: ""
      doppler-project-runtime:
        description: "Optional Doppler project for runtime env on dev VPS"
        required: false
        type: string
        default: ""
      doppler-config-runtime:
        description: "Optional Doppler config for runtime env on dev VPS"
        required: false
        type: string
        default: ""
      runner:
        description: "Runner label override"
        required: false
        type: string
        default: ""
    secrets:
      GH_PAT:
        required: false
        description: "GitHub Personal Access Token for GHCR push (falls back to GITHUB_TOKEN)"
      DOPPLER_TOKEN:
        required: true
        description: "Doppler token for build secrets resolution"
      DEPLOY_DOPPLER_TOKEN:
        required: true
        description: "Doppler token scoped to kombify-ionos-dev/dev for SSH credentials"
      DOPPLER_TOKEN_RUNTIME:
        required: false
        description: "Optional separate Doppler token for runtime env (e.g. kombify-io/dev_cloud)"
    outputs:
      image:
        description: "Built image reference (with git-{sha} tag)"
        value: ${{ jobs.build.outputs.image }}
      image_tag:
        description: "Resolved image tag"
        value: ${{ jobs.build.outputs.image_tag }}

concurrency:
  # One auto-deploy-dev per repo+ref. Don't cancel — finish ordering matters
  # for "kombify.dev = main HEAD" guarantee.
  group: auto-deploy-dev-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push to GHCR
    uses: KombiverseLabs/.github/.github/workflows/build-and-push.yml@main
    with:
      image-name: ${{ inputs.image-name != '' && inputs.image-name || inputs.service-name }}
      dockerfile: ${{ inputs.dockerfile }}
      context: ${{ inputs.docker-context }}
      build-args: ${{ inputs.build-args }}
      doppler-build-secrets: ${{ inputs.doppler-build-secrets }}
      platforms: ${{ inputs.platforms }}
      runner: ${{ inputs.runner != '' && inputs.runner || (vars.BUILD_RUNNER || 'blacksmith-2vcpu-ubuntu-2204') }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  deploy:
    name: Deploy to kombify.dev
    needs: build
    uses: KombiverseLabs/.github/.github/workflows/deploy-vps-ssh.yml@main
    with:
      service-name: "${{ inputs.service-name }} (dev)"
      compose-service: ${{ inputs.compose-service }}
      compose-dir: ${{ inputs.compose-dir }}
      compose-file-source: ${{ inputs.compose-file-source }}
      compose-file-destination: ${{ inputs.compose-file-destination }}
      runtime-env-project: ${{ inputs.doppler-project-runtime }}
      runtime-env-config: ${{ inputs.doppler-config-runtime }}
      health-check-url: ${{ inputs.health-check-url }}
      health-check-retries: ${{ inputs.health-check-retries }}
      health-check-interval: ${{ inputs.health-check-interval }}
      doppler-project: kombify-ionos-dev
      doppler-config: dev
      runner: ${{ inputs.runner != '' && inputs.runner || (vars.DEPLOY_RUNNER || 'blacksmith-2vcpu-ubuntu-2204') }}
    secrets:
      DOPPLER_TOKEN: ${{ secrets.DEPLOY_DOPPLER_TOKEN }}
      DOPPLER_TOKEN_RUNTIME: ${{ secrets.DOPPLER_TOKEN_RUNTIME }}

  smoke:
    name: Quick Smoke
    needs: deploy
    uses: KombiverseLabs/.github/.github/workflows/quick-smoke.yml@main
    with:
      service-url: ${{ inputs.health-check-url }}
      smoke-expected-content: ${{ inputs.smoke-expected-content }}
      runner: ${{ inputs.runner != '' && inputs.runner || (vars.CI_RUNNER || 'blacksmith-2vcpu-ubuntu-2204') }}

  summary:
    name: Auto-Deploy Summary
    needs: [build, deploy, smoke]
    runs-on: ${{ inputs.runner != '' && inputs.runner || (vars.CI_RUNNER || 'blacksmith-2vcpu-ubuntu-2204') }}
    timeout-minutes: 2
    if: always()
    steps:
      - name: Report
        run: |
          {
            echo "### Auto-Deploy Dev Summary"
            echo ""
            echo "**Service:** ${{ inputs.service-name }}"
            echo "**Image:** ${{ needs.build.outputs.image }}"
            echo "**Target:** kombify.dev"
            echo "**Health URL:** ${{ inputs.health-check-url }}"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Build | ${{ needs.build.result }} |"
            echo "| Deploy | ${{ needs.deploy.result }} |"
            echo "| Smoke | ${{ needs.smoke.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Fail if any upstream failed
          if [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.deploy.result }}" != "success" ] || \
             [ "${{ needs.smoke.result }}" != "success" ]; then
            echo "::error::auto-deploy-dev failed for ${{ inputs.service-name }}"
            exit 1
          fi
