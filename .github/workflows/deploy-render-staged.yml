name: Deploy via Render (Staged)
# Render deployment: resolve service ID from Doppler, sync runtime env from
# service-specific Doppler configs, trigger image deploy via API, poll until
# live, health check. Supports optional staging → production pipeline.
#
# Required Doppler config (behind DOPPLER_TOKEN_RENDER):
#   default scope: kombify-io/prd_render
#   RENDER_API_KEY           — Render API key
#   <service-id-key>         — Render service ID per service (e.g. RENDER_CLOUD_SERVICE_ID)
# Optional runtime env config can use a separate token (DOPPLER_TOKEN_RUNTIME)
# when the service env lives in a different Doppler project/config.

on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name for logging"
        required: true
        type: string
      service-id-key-production:
        description: "Doppler key holding the Render service ID for production"
        required: true
        type: string
      service-id-key-staging:
        description: "Doppler key holding the Render service ID for staging"
        required: false
        type: string
      runtime-env-project:
        description: "Doppler project that owns the service runtime environment"
        required: false
        type: string
      runtime-env-config:
        description: "Doppler config that owns the service runtime environment"
        required: false
        type: string
      render-credentials-project:
        description: "Doppler project that holds RENDER_API_KEY + Render service IDs"
        required: false
        type: string
        default: "kombify-io"
      render-credentials-config:
        description: "Doppler config that holds RENDER_API_KEY + Render service IDs"
        required: false
        type: string
        default: "prd_render"
      preserve-runtime-env-extras:
        description: "When true, do not delete direct Render env vars missing from Doppler"
        required: false
        type: boolean
        default: false
      image-tag:
        description: "Docker image tag to deploy. Required when image-repository is set; latest is rejected."
        required: false
        type: string
        default: ""
      image-repository:
        description: "Full GHCR image repository"
        required: false
        type: string
      health-check-url-production:
        description: "URL to probe after production deployment"
        required: false
        type: string
      health-check-url-staging:
        description: "URL to probe after staging deployment"
        required: false
        type: string
      skip-staging:
        description: "Skip staging deployment"
        required: false
        type: boolean
        default: false
      health-check-retries:
        description: "Number of health check retries"
        required: false
        type: number
        default: 12
      health-check-interval:
        description: "Seconds between health check retries"
        required: false
        type: number
        default: 10
      force:
        description: "Force redeploy (clear build cache)"
        required: false
        type: boolean
        default: false
      runner:
        description: "Runner label"
        required: false
        type: string
        default: "blacksmith-2vcpu-ubuntu-2204"
    secrets:
      DOPPLER_TOKEN_RENDER:
        description: "Doppler service token for config holding RENDER_API_KEY + service IDs"
        required: true
      DOPPLER_TOKEN_RUNTIME:
        description: "Optional Doppler service token for runtime env config sync"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.service-name }}-${{ inputs.service-id-key-production }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-staging:
    name: "${{ inputs.service-name }} → Staging"
    if: inputs.skip-staging != true && inputs.service-id-key-staging != ''
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    outputs:
      status: ${{ steps.wait.outputs.status }}
    steps:
      - name: Bootstrap Doppler CLI
        uses: KombiverseLabs/.github/.github/actions/doppler-bootstrap@main
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_RENDER }}
          validate-project: ${{ inputs.render-credentials-project }}
          validate-config: ${{ inputs.render-credentials-config }}

      - name: Resolve Render credentials
        id: resolve
        shell: bash
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_RENDER }}
        run: |
          DOPPLER_SCOPE_ARGS=(
            --project "${{ inputs.render-credentials-project }}"
            --config "${{ inputs.render-credentials-config }}"
            --token "$DOPPLER_TOKEN"
            --no-read-env
          )

          RENDER_API_KEY=$(doppler secrets get RENDER_API_KEY --plain "${DOPPLER_SCOPE_ARGS[@]}")
          echo "::add-mask::$RENDER_API_KEY"
          echo "api_key=$RENDER_API_KEY" >> "$GITHUB_OUTPUT"

          SERVICE_ID=$(doppler secrets get "${{ inputs.service-id-key-staging }}" --plain "${DOPPLER_SCOPE_ARGS[@]}")
          echo "service_id=$SERVICE_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved staging service ID for ${{ inputs.service-name }}: $SERVICE_ID"

      - name: Sync runtime environment from Doppler
        if: inputs.runtime-env-project != '' && inputs.runtime-env-config != ''
        shell: bash
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_RUNTIME || secrets.DOPPLER_TOKEN_RENDER }}
          RENDER_API_KEY: ${{ steps.resolve.outputs.api_key }}
          SERVICE_ID: ${{ steps.resolve.outputs.service_id }}
          PRESERVE_RUNTIME_ENV_EXTRAS: ${{ inputs.preserve-runtime-env-extras }}
          RUNTIME_ENV_JSON: ${{ runner.temp }}/render-runtime-env.json
        run: |
          doppler secrets download \
            --format json \
            --no-file \
            --project "${{ inputs.runtime-env-project }}" \
            --config "${{ inputs.runtime-env-config }}" \
            --token "$DOPPLER_TOKEN" \
            --no-read-env > "$RUNTIME_ENV_JSON"

          python3 <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          service_id = os.environ["SERVICE_ID"]
          api_key = os.environ["RENDER_API_KEY"]
          env_path = Path(os.environ["RUNTIME_ENV_JSON"])
          preserve_extras = os.environ["PRESERVE_RUNTIME_ENV_EXTRAS"].lower() == "true"
          desired = json.loads(env_path.read_text(encoding="utf-8"))

          headers = {
              "Authorization": f"Bearer {api_key}",
              "Accept": "application/json",
              "Content-Type": "application/json",
          }
          base_url = f"https://api.render.com/v1/services/{service_id}/env-vars"

          def request(method: str, url: str, body: object | None = None) -> object:
              payload = json.dumps(body).encode("utf-8") if body is not None else None
              max_attempts = 6
              retryable = {429, 500, 502, 503, 504}

              for attempt in range(1, max_attempts + 1):
                  req = urllib.request.Request(url, data=payload, headers=headers, method=method)
                  try:
                      with urllib.request.urlopen(req) as response:
                          if response.status == 204:
                              return None
                          raw = response.read().decode("utf-8")
                          return json.loads(raw) if raw else None
                  except urllib.error.HTTPError as exc:
                      detail = exc.read().decode("utf-8", errors="replace")
                      if exc.code in retryable and attempt < max_attempts:
                          retry_after = (exc.headers.get("Retry-After") or "").strip()
                          wait_seconds = int(retry_after) if retry_after.isdigit() else min(2 ** attempt, 20)
                          if exc.code == 429:
                              wait_seconds = max(wait_seconds, min(5 * attempt, 30))
                          print(
                              f"Render API HTTP {exc.code} on {method} {url}; retry in {wait_seconds}s "
                              f"(attempt {attempt}/{max_attempts})"
                          )
                          time.sleep(wait_seconds)
                          continue
                      raise SystemExit(f"Render env sync failed ({method} {url}): HTTP {exc.code} {detail}") from exc
                  except urllib.error.URLError as exc:
                      if attempt < max_attempts:
                          wait_seconds = min(2 ** attempt, 20)
                          print(
                              f"Render API network error on {method} {url}: {exc.reason}; retry in {wait_seconds}s "
                              f"(attempt {attempt}/{max_attempts})"
                          )
                          time.sleep(wait_seconds)
                          continue
                      raise SystemExit(f"Render env sync failed ({method} {url}): network error {exc.reason}") from exc

          current_payload = request("GET", f"{base_url}?limit=100")
          if isinstance(current_payload, list):
              current_items = current_payload
          elif isinstance(current_payload, dict):
              current_items = (
                  current_payload.get("items")
                  or current_payload.get("data")
                  or current_payload.get("envVars")
                  or current_payload.get("environmentVariables")
                  or []
              )
          else:
              current_items = []

          current_values: dict[str, str] = {}
          for item in current_items:
              if not isinstance(item, dict):
                  continue
              env_var = item.get("envVar") if isinstance(item.get("envVar"), dict) else item
              key = env_var.get("key") or env_var.get("envVarKey") or env_var.get("name")
              value = env_var.get("value")
              if key is not None and value is not None:
                  current_values[str(key)] = str(value)

          # Render rejects empty-string env vars with HTTP 400
          # ("must provide a value or generateValue must be set to true").
          # Optional Doppler secrets (e.g. SERVICE_AUTH_SECRET_NEXT during a
          # non-rotation window) legitimately carry empty strings -- preserve
          # any existing Render value for those keys when the API returns it.
          payload: list[dict[str, str]] = []
          preserved_empty_keys = 0
          omitted_empty_keys = 0
          for key, value in desired.items():
              if value is None or str(value) == "":
                  existing_value = current_values.get(str(key))
                  if existing_value:
                      payload.append({"key": str(key), "value": existing_value})
                      preserved_empty_keys += 1
                  else:
                      omitted_empty_keys += 1
                  continue
              payload.append({"key": str(key), "value": str(value)})

          stale_keys = sorted(set(current_values) - set(desired))
          if preserve_extras:
              for key in stale_keys:
                  payload.append({"key": key, "value": current_values[key]})

          request("PUT", base_url, payload)

          print(
              f"Synced {len(payload)} Render env vars from {len(desired)} Doppler vars to service {service_id}"
              + (f"; removed {len(stale_keys)} stale direct vars" if not preserve_extras else f"; preserved {len(stale_keys)} extra direct vars")
              + (f"; preserved {preserved_empty_keys} empty Doppler keys from existing Render values" if preserved_empty_keys else "")
              + (f"; omitted {omitted_empty_keys} empty Doppler keys" if omitted_empty_keys else "")
          )
          PY

      - name: Trigger deploy
        id: deploy
        shell: bash
        run: |
          SERVICE_ID="${{ steps.resolve.outputs.service_id }}"
          CLEAR_CACHE="${{ inputs.force && 'clear' || 'do_not_clear' }}"
          DEPLOY_URL="https://api.render.com/v1/services/${SERVICE_ID}/deploys"
          AUTH_HEADER="Authorization: Bearer ${{ steps.resolve.outputs.api_key }}"

          # Build deploy payload -- include imageUrl if image-repository is specified.
          IMAGE_REPO="${{ inputs.image-repository }}"
          IMAGE_TAG="${{ inputs.image-tag }}"
          IMAGE_URL=""
          if [ -n "$IMAGE_REPO" ]; then
            if [ -z "$IMAGE_TAG" ] || [ "$IMAGE_TAG" = "latest" ]; then
              echo "::error::image-tag must be an explicit immutable tag when image-repository is set; refusing '${IMAGE_TAG:-<empty>}'"
              exit 1
            fi
            IMAGE_URL="${IMAGE_REPO}:${IMAGE_TAG}"
            BODY=$(jq -cn --arg clearCache "$CLEAR_CACHE" --arg imageUrl "$IMAGE_URL" \
              '{clearCache: $clearCache, imageUrl: $imageUrl}')
            echo "Deploying image: ${IMAGE_URL}"
          else
            BODY=$(jq -cn --arg clearCache "$CLEAR_CACHE" '{clearCache: $clearCache}')
            echo "Deploying current Render service image (no image override)"
          fi

          is_retryable_status() {
            case "$1" in
              408|409|425|429|500|502|503|504) return 0 ;;
              *) return 1 ;;
            esac
          }

          retry_delay() {
            local attempt="$1"
            local headers_file="$2"
            local retry_after
            retry_after=$(awk 'tolower($1) == "retry-after:" { gsub("\r", "", $2); print $2; exit }' "$headers_file")
            if [[ "$retry_after" =~ ^[0-9]+$ ]]; then
              echo "$retry_after"
            else
              echo $(( attempt < 6 ? attempt * 5 : 30 ))
            fi
          }

          trigger_deploy() {
            local body="$1"
            local label="$2"
            local response_file
            local headers_file
            local http_code
            local response
            local wait_seconds

            DEPLOY_RESPONSE=""
            DEPLOY_HTTP_CODE=""

            for attempt in 1 2 3 4 5; do
              response_file=$(mktemp)
              headers_file=$(mktemp)
              http_code=$(curl -sS -D "$headers_file" -o "$response_file" -w '%{http_code}' -X POST \
                -H "$AUTH_HEADER" \
                -H "Accept: application/json" \
                -H "Content-Type: application/json" \
                -d "$body" \
                "$DEPLOY_URL" || true)
              http_code="${http_code:-000}"
              response=$(cat "$response_file")

              if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                DEPLOY_RESPONSE="$response"
                DEPLOY_HTTP_CODE="$http_code"
                rm -f "$response_file" "$headers_file"
                return 0
              fi

              if is_retryable_status "$http_code" && [ "$attempt" -lt 5 ]; then
                wait_seconds=$(retry_delay "$attempt" "$headers_file")
                echo "Render deploy trigger returned HTTP $http_code for $label; retry in ${wait_seconds}s (attempt $attempt/5)"
                echo "$response"
                rm -f "$response_file" "$headers_file"
                sleep "$wait_seconds"
                continue
              fi

              DEPLOY_RESPONSE="$response"
              DEPLOY_HTTP_CODE="$http_code"
              rm -f "$response_file" "$headers_file"
              return 1
            done
          }

          fail_deploy_trigger() {
            echo "::error::Render deploy trigger failed with HTTP ${DEPLOY_HTTP_CODE:-unknown}"
            echo "$DEPLOY_RESPONSE"
            exit 1
          }

          if ! trigger_deploy "$BODY" "requested image"; then
            # Render can accept the imageUrl update and still return a transient 5xx.
            # If the service now points at the requested immutable image, trigger a
            # normal deploy for the current image reference instead of failing.
            if [ -n "$IMAGE_URL" ] && [ "${DEPLOY_HTTP_CODE:-0}" -ge 500 ]; then
              SERVICE_RESPONSE_FILE=$(mktemp)
              SERVICE_HTTP_CODE=$(curl -sS -o "$SERVICE_RESPONSE_FILE" -w '%{http_code}' \
                -H "$AUTH_HEADER" \
                -H "Accept: application/json" \
                "https://api.render.com/v1/services/${SERVICE_ID}" || true)
              SERVICE_HTTP_CODE="${SERVICE_HTTP_CODE:-000}"
              CURRENT_IMAGE=$(jq -r '.imagePath // empty' "$SERVICE_RESPONSE_FILE" 2>/dev/null || true)
              rm -f "$SERVICE_RESPONSE_FILE"

              if [ "$SERVICE_HTTP_CODE" -ge 200 ] && [ "$SERVICE_HTTP_CODE" -lt 300 ] && [ "$CURRENT_IMAGE" = "$IMAGE_URL" ]; then
                echo "Render accepted image reference before returning HTTP $DEPLOY_HTTP_CODE; triggering deploy for current image reference"
                FALLBACK_BODY=$(jq -cn --arg clearCache "$CLEAR_CACHE" '{clearCache: $clearCache}')
                trigger_deploy "$FALLBACK_BODY" "current image reference" || fail_deploy_trigger
              else
                fail_deploy_trigger
              fi
            else
              fail_deploy_trigger
            fi
          fi

          DEPLOY_ID=$(echo "$DEPLOY_RESPONSE" | jq -r '.id // .deploy.id // empty')
          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::Render deploy trigger response did not include a deploy id"
            echo "$DEPLOY_RESPONSE"
            exit 1
          fi

          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Deploy triggered: $DEPLOY_ID"

      - name: Wait for deploy
        id: wait
        shell: bash
        run: |
          SERVICE_ID="${{ steps.resolve.outputs.service_id }}"
          DEPLOY_ID="${{ steps.deploy.outputs.deploy_id }}"
          MAX_ATTEMPTS=60

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -sf \
              -H "Authorization: Bearer ${{ steps.resolve.outputs.api_key }}" \
              "https://api.render.com/v1/services/${SERVICE_ID}/deploys/${DEPLOY_ID}")

            STATUS=$(echo "$RESPONSE" | jq -r '.status')
            echo "  Poll $i/$MAX_ATTEMPTS: $STATUS"

            case "$STATUS" in
              live)
                echo "status=live" >> "$GITHUB_OUTPUT"
                echo "Deploy is live"
                exit 0
                ;;
              build_failed|update_failed|canceled|deactivated)
                echo "status=$STATUS" >> "$GITHUB_OUTPUT"
                echo "::error::Deploy failed with status: $STATUS"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "status=timeout" >> "$GITHUB_OUTPUT"
          echo "::error::Deploy timed out after $((MAX_ATTEMPTS * 10))s"
          exit 1

      - name: Health check
        if: inputs.health-check-url-staging != ''
        shell: bash
        run: |
          URL="${{ inputs.health-check-url-staging }}"
          RETRIES=${{ inputs.health-check-retries }}
          INTERVAL=${{ inputs.health-check-interval }}

          echo "Health checking: $URL (max $RETRIES attempts, ${INTERVAL}s interval)"
          for i in $(seq 1 "$RETRIES"); do
            HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' --max-time 10 "$URL" 2>/dev/null || echo "000")
            echo "  Attempt $i/$RETRIES: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "Health check passed"
              exit 0
            fi

            if [ "$i" -lt "$RETRIES" ]; then
              sleep "$INTERVAL"
            fi
          done

          echo "::error::Health check failed after $RETRIES attempts at $URL"
          exit 1

  deploy-production:
    name: "${{ inputs.service-name }} → Production"
    needs: [deploy-staging]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    steps:
      - name: Bootstrap Doppler CLI
        uses: KombiverseLabs/.github/.github/actions/doppler-bootstrap@main
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_RENDER }}
          validate-project: ${{ inputs.render-credentials-project }}
          validate-config: ${{ inputs.render-credentials-config }}

      - name: Resolve Render credentials
        id: resolve
        shell: bash
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_RENDER }}
        run: |
          DOPPLER_SCOPE_ARGS=(
            --project "${{ inputs.render-credentials-project }}"
            --config "${{ inputs.render-credentials-config }}"
            --token "$DOPPLER_TOKEN"
            --no-read-env
          )

          RENDER_API_KEY=$(doppler secrets get RENDER_API_KEY --plain "${DOPPLER_SCOPE_ARGS[@]}")
          echo "::add-mask::$RENDER_API_KEY"
          echo "api_key=$RENDER_API_KEY" >> "$GITHUB_OUTPUT"

          SERVICE_ID=$(doppler secrets get "${{ inputs.service-id-key-production }}" --plain "${DOPPLER_SCOPE_ARGS[@]}")
          echo "service_id=$SERVICE_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved production service ID for ${{ inputs.service-name }}: $SERVICE_ID"

      - name: Sync runtime environment from Doppler
        if: inputs.runtime-env-project != '' && inputs.runtime-env-config != ''
        shell: bash
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_RUNTIME || secrets.DOPPLER_TOKEN_RENDER }}
          RENDER_API_KEY: ${{ steps.resolve.outputs.api_key }}
          SERVICE_ID: ${{ steps.resolve.outputs.service_id }}
          PRESERVE_RUNTIME_ENV_EXTRAS: ${{ inputs.preserve-runtime-env-extras }}
          RUNTIME_ENV_JSON: ${{ runner.temp }}/render-runtime-env.json
        run: |
          doppler secrets download \
            --format json \
            --no-file \
            --project "${{ inputs.runtime-env-project }}" \
            --config "${{ inputs.runtime-env-config }}" \
            --token "$DOPPLER_TOKEN" \
            --no-read-env > "$RUNTIME_ENV_JSON"

          python3 <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          service_id = os.environ["SERVICE_ID"]
          api_key = os.environ["RENDER_API_KEY"]
          env_path = Path(os.environ["RUNTIME_ENV_JSON"])
          preserve_extras = os.environ["PRESERVE_RUNTIME_ENV_EXTRAS"].lower() == "true"
          desired = json.loads(env_path.read_text(encoding="utf-8"))

          headers = {
              "Authorization": f"Bearer {api_key}",
              "Accept": "application/json",
              "Content-Type": "application/json",
          }
          base_url = f"https://api.render.com/v1/services/{service_id}/env-vars"

          def request(method: str, url: str, body: object | None = None) -> object:
              payload = json.dumps(body).encode("utf-8") if body is not None else None
              max_attempts = 6
              retryable = {429, 500, 502, 503, 504}

              for attempt in range(1, max_attempts + 1):
                  req = urllib.request.Request(url, data=payload, headers=headers, method=method)
                  try:
                      with urllib.request.urlopen(req) as response:
                          if response.status == 204:
                              return None
                          raw = response.read().decode("utf-8")
                          return json.loads(raw) if raw else None
                  except urllib.error.HTTPError as exc:
                      detail = exc.read().decode("utf-8", errors="replace")
                      if exc.code in retryable and attempt < max_attempts:
                          retry_after = (exc.headers.get("Retry-After") or "").strip()
                          wait_seconds = int(retry_after) if retry_after.isdigit() else min(2 ** attempt, 20)
                          if exc.code == 429:
                              wait_seconds = max(wait_seconds, min(5 * attempt, 30))
                          print(
                              f"Render API HTTP {exc.code} on {method} {url}; retry in {wait_seconds}s "
                              f"(attempt {attempt}/{max_attempts})"
                          )
                          time.sleep(wait_seconds)
                          continue
                      raise SystemExit(f"Render env sync failed ({method} {url}): HTTP {exc.code} {detail}") from exc
                  except urllib.error.URLError as exc:
                      if attempt < max_attempts:
                          wait_seconds = min(2 ** attempt, 20)
                          print(
                              f"Render API network error on {method} {url}: {exc.reason}; retry in {wait_seconds}s "
                              f"(attempt {attempt}/{max_attempts})"
                          )
                          time.sleep(wait_seconds)
                          continue
                      raise SystemExit(f"Render env sync failed ({method} {url}): network error {exc.reason}") from exc

          current_payload = request("GET", f"{base_url}?limit=100")
          if isinstance(current_payload, list):
              current_items = current_payload
          elif isinstance(current_payload, dict):
              current_items = (
                  current_payload.get("items")
                  or current_payload.get("data")
                  or current_payload.get("envVars")
                  or current_payload.get("environmentVariables")
                  or []
              )
          else:
              current_items = []

          current_values: dict[str, str] = {}
          for item in current_items:
              if not isinstance(item, dict):
                  continue
              env_var = item.get("envVar") if isinstance(item.get("envVar"), dict) else item
              key = env_var.get("key") or env_var.get("envVarKey") or env_var.get("name")
              value = env_var.get("value")
              if key is not None and value is not None:
                  current_values[str(key)] = str(value)

          # Render rejects empty-string env vars with HTTP 400
          # ("must provide a value or generateValue must be set to true").
          # Optional Doppler secrets (e.g. SERVICE_AUTH_SECRET_NEXT during a
          # non-rotation window) legitimately carry empty strings -- preserve
          # any existing Render value for those keys when the API returns it.
          payload: list[dict[str, str]] = []
          preserved_empty_keys = 0
          omitted_empty_keys = 0
          for key, value in desired.items():
              if value is None or str(value) == "":
                  existing_value = current_values.get(str(key))
                  if existing_value:
                      payload.append({"key": str(key), "value": existing_value})
                      preserved_empty_keys += 1
                  else:
                      omitted_empty_keys += 1
                  continue
              payload.append({"key": str(key), "value": str(value)})

          stale_keys = sorted(set(current_values) - set(desired))
          if preserve_extras:
              for key in stale_keys:
                  payload.append({"key": key, "value": current_values[key]})

          request("PUT", base_url, payload)

          print(
              f"Synced {len(payload)} Render env vars from {len(desired)} Doppler vars to service {service_id}"
              + (f"; removed {len(stale_keys)} stale direct vars" if not preserve_extras else f"; preserved {len(stale_keys)} extra direct vars")
              + (f"; preserved {preserved_empty_keys} empty Doppler keys from existing Render values" if preserved_empty_keys else "")
              + (f"; omitted {omitted_empty_keys} empty Doppler keys" if omitted_empty_keys else "")
          )
          PY

      - name: Trigger deploy
        id: deploy
        shell: bash
        run: |
          SERVICE_ID="${{ steps.resolve.outputs.service_id }}"
          CLEAR_CACHE="${{ inputs.force && 'clear' || 'do_not_clear' }}"
          DEPLOY_URL="https://api.render.com/v1/services/${SERVICE_ID}/deploys"
          AUTH_HEADER="Authorization: Bearer ${{ steps.resolve.outputs.api_key }}"

          # Build deploy payload -- include imageUrl if image-repository is specified.
          IMAGE_REPO="${{ inputs.image-repository }}"
          IMAGE_TAG="${{ inputs.image-tag }}"
          IMAGE_URL=""
          if [ -n "$IMAGE_REPO" ]; then
            if [ -z "$IMAGE_TAG" ] || [ "$IMAGE_TAG" = "latest" ]; then
              echo "::error::image-tag must be an explicit immutable tag when image-repository is set; refusing '${IMAGE_TAG:-<empty>}'"
              exit 1
            fi
            IMAGE_URL="${IMAGE_REPO}:${IMAGE_TAG}"
            BODY=$(jq -cn --arg clearCache "$CLEAR_CACHE" --arg imageUrl "$IMAGE_URL" \
              '{clearCache: $clearCache, imageUrl: $imageUrl}')
            echo "Deploying image: ${IMAGE_URL}"
          else
            BODY=$(jq -cn --arg clearCache "$CLEAR_CACHE" '{clearCache: $clearCache}')
            echo "Deploying current Render service image (no image override)"
          fi

          is_retryable_status() {
            case "$1" in
              408|409|425|429|500|502|503|504) return 0 ;;
              *) return 1 ;;
            esac
          }

          retry_delay() {
            local attempt="$1"
            local headers_file="$2"
            local retry_after
            retry_after=$(awk 'tolower($1) == "retry-after:" { gsub("\r", "", $2); print $2; exit }' "$headers_file")
            if [[ "$retry_after" =~ ^[0-9]+$ ]]; then
              echo "$retry_after"
            else
              echo $(( attempt < 6 ? attempt * 5 : 30 ))
            fi
          }

          trigger_deploy() {
            local body="$1"
            local label="$2"
            local response_file
            local headers_file
            local http_code
            local response
            local wait_seconds

            DEPLOY_RESPONSE=""
            DEPLOY_HTTP_CODE=""

            for attempt in 1 2 3 4 5; do
              response_file=$(mktemp)
              headers_file=$(mktemp)
              http_code=$(curl -sS -D "$headers_file" -o "$response_file" -w '%{http_code}' -X POST \
                -H "$AUTH_HEADER" \
                -H "Accept: application/json" \
                -H "Content-Type: application/json" \
                -d "$body" \
                "$DEPLOY_URL" || true)
              http_code="${http_code:-000}"
              response=$(cat "$response_file")

              if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                DEPLOY_RESPONSE="$response"
                DEPLOY_HTTP_CODE="$http_code"
                rm -f "$response_file" "$headers_file"
                return 0
              fi

              if is_retryable_status "$http_code" && [ "$attempt" -lt 5 ]; then
                wait_seconds=$(retry_delay "$attempt" "$headers_file")
                echo "Render deploy trigger returned HTTP $http_code for $label; retry in ${wait_seconds}s (attempt $attempt/5)"
                echo "$response"
                rm -f "$response_file" "$headers_file"
                sleep "$wait_seconds"
                continue
              fi

              DEPLOY_RESPONSE="$response"
              DEPLOY_HTTP_CODE="$http_code"
              rm -f "$response_file" "$headers_file"
              return 1
            done
          }

          fail_deploy_trigger() {
            echo "::error::Render deploy trigger failed with HTTP ${DEPLOY_HTTP_CODE:-unknown}"
            echo "$DEPLOY_RESPONSE"
            exit 1
          }

          if ! trigger_deploy "$BODY" "requested image"; then
            # Render can accept the imageUrl update and still return a transient 5xx.
            # If the service now points at the requested immutable image, trigger a
            # normal deploy for the current image reference instead of failing.
            if [ -n "$IMAGE_URL" ] && [ "${DEPLOY_HTTP_CODE:-0}" -ge 500 ]; then
              SERVICE_RESPONSE_FILE=$(mktemp)
              SERVICE_HTTP_CODE=$(curl -sS -o "$SERVICE_RESPONSE_FILE" -w '%{http_code}' \
                -H "$AUTH_HEADER" \
                -H "Accept: application/json" \
                "https://api.render.com/v1/services/${SERVICE_ID}" || true)
              SERVICE_HTTP_CODE="${SERVICE_HTTP_CODE:-000}"
              CURRENT_IMAGE=$(jq -r '.imagePath // empty' "$SERVICE_RESPONSE_FILE" 2>/dev/null || true)
              rm -f "$SERVICE_RESPONSE_FILE"

              if [ "$SERVICE_HTTP_CODE" -ge 200 ] && [ "$SERVICE_HTTP_CODE" -lt 300 ] && [ "$CURRENT_IMAGE" = "$IMAGE_URL" ]; then
                echo "Render accepted image reference before returning HTTP $DEPLOY_HTTP_CODE; triggering deploy for current image reference"
                FALLBACK_BODY=$(jq -cn --arg clearCache "$CLEAR_CACHE" '{clearCache: $clearCache}')
                trigger_deploy "$FALLBACK_BODY" "current image reference" || fail_deploy_trigger
              else
                fail_deploy_trigger
              fi
            else
              fail_deploy_trigger
            fi
          fi

          DEPLOY_ID=$(echo "$DEPLOY_RESPONSE" | jq -r '.id // .deploy.id // empty')
          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::Render deploy trigger response did not include a deploy id"
            echo "$DEPLOY_RESPONSE"
            exit 1
          fi

          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Deploy triggered: $DEPLOY_ID"

      - name: Wait for deploy
        id: wait
        shell: bash
        run: |
          SERVICE_ID="${{ steps.resolve.outputs.service_id }}"
          DEPLOY_ID="${{ steps.deploy.outputs.deploy_id }}"
          MAX_ATTEMPTS=60

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -sf \
              -H "Authorization: Bearer ${{ steps.resolve.outputs.api_key }}" \
              "https://api.render.com/v1/services/${SERVICE_ID}/deploys/${DEPLOY_ID}")

            STATUS=$(echo "$RESPONSE" | jq -r '.status')
            echo "  Poll $i/$MAX_ATTEMPTS: $STATUS"

            case "$STATUS" in
              live)
                echo "Deploy is live"
                exit 0
                ;;
              build_failed|update_failed|canceled|deactivated)
                echo "::error::Deploy failed with status: $STATUS"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "::error::Deploy timed out after $((MAX_ATTEMPTS * 10))s"
          exit 1

      - name: Health check
        if: inputs.health-check-url-production != ''
        shell: bash
        run: |
          URL="${{ inputs.health-check-url-production }}"
          RETRIES=${{ inputs.health-check-retries }}
          INTERVAL=${{ inputs.health-check-interval }}

          echo "Health checking: $URL (max $RETRIES attempts, ${INTERVAL}s interval)"
          for i in $(seq 1 "$RETRIES"); do
            HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' --max-time 10 "$URL" 2>/dev/null || echo "000")
            echo "  Attempt $i/$RETRIES: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "Health check passed"
              exit 0
            fi

            if [ "$i" -lt "$RETRIES" ]; then
              sleep "$INTERVAL"
            fi
          done

          echo "::error::Health check failed after $RETRIES attempts at $URL"
          exit 1
