name: Sync GHCR Auth

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label for the target server host'
        required: true
        type: string
      validation-image:
        description: 'Optional image reference to pull after login to verify registry access on the target host'
        required: false
        type: string
        default: ''
    secrets:
      DEPLOY_DOPPLER_TOKEN:
        description: 'Doppler server/service token used to resolve GHCR credentials'
        required: true
      GHCR_TOKEN_FALLBACK:
        description: 'Optional bootstrap token from GitHub Secrets. When omitted, the workflow falls back to github.token.'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  sync:
    name: Sync GHCR Auth
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 3

    steps:
      - name: Install Doppler CLI
        run: |
          if command -v doppler >/dev/null 2>&1; then
            doppler --version
            exit 0
          fi

          sudo mkdir -p /usr/share/keyrings
          if [ ! -f /usr/share/keyrings/doppler-archive-keyring.gpg ]; then
            curl -sLf --retry 3 --tlsv1.2 --proto "=https" \
              'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' \
              | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
          fi
          if [ ! -f /etc/apt/sources.list.d/doppler-cli.list ]; then
            echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] \
              https://packages.doppler.com/public/cli/deb/debian any-version main" \
              | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          fi

          sudo apt-get update -qq
          sudo apt-get install -y doppler

      - name: Resolve GHCR credentials
        id: ghcr
        env:
          DEPLOY_DOPPLER_TOKEN: ${{ secrets.DEPLOY_DOPPLER_TOKEN }}
          GHCR_TOKEN_FALLBACK: ${{ secrets.GHCR_TOKEN_FALLBACK || github.token }}
        run: |
          DOPPLER_TOKEN="$DEPLOY_DOPPLER_TOKEN" doppler secrets download --no-file --format json > /tmp/deploy_doppler_secrets.json

          python3 << 'PYEOF'
          import json
          import os
          import sys

          with open('/tmp/deploy_doppler_secrets.json', 'r', encoding='utf-8') as handle:
              secret_map = json.load(handle)

          username = (
              str(secret_map.get('GHCR_USERNAME', '')).strip()
              or str(secret_map.get('GITHUB_REGISTRY_USERNAME', '')).strip()
              or str(secret_map.get('GITHUB_USERNAME', '')).strip()
              or os.environ.get('GITHUB_ACTOR', '').strip()
              or 'KombiverseLabs'
          )
          token = ''
          for key in ('GHCR_TOKEN', 'GHCR_PAT', 'GH_PAT', 'GITHUB_PAT'):
              value = str(secret_map.get(key, '')).strip()
              if value:
                  token = value
                  break

          used_fallback = False
          fallback_token = os.environ.get('GHCR_TOKEN_FALLBACK', '').strip()
          if not token and fallback_token:
              token = fallback_token
              used_fallback = True

          if not token:
              print(
                  'GHCR credentials are required. Set GHCR_TOKEN, GHCR_PAT, or GH_PAT in the deploy Doppler project.',
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(f'::add-mask::{token}')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              print(f'username={username}', file=handle)
              print(f'token={token}', file=handle)
              print(f'used_fallback={"true" if used_fallback else "false"}', file=handle)
          PYEOF

      - name: Bootstrap GHCR credentials into Doppler
        if: steps.ghcr.outputs.used_fallback == 'true'
        continue-on-error: true
        env:
          DEPLOY_DOPPLER_TOKEN: ${{ secrets.DEPLOY_DOPPLER_TOKEN }}
          GHCR_USERNAME: ${{ steps.ghcr.outputs.username }}
          GHCR_TOKEN: ${{ steps.ghcr.outputs.token }}
        run: |
          DOPPLER_TOKEN="$DEPLOY_DOPPLER_TOKEN" doppler secrets set \
            GHCR_USERNAME="$GHCR_USERNAME" \
            GHCR_PAT="$GHCR_TOKEN" \
            --silent

      - name: Login to GHCR on target host
        env:
          GHCR_USERNAME: ${{ steps.ghcr.outputs.username }}
          GHCR_TOKEN: ${{ steps.ghcr.outputs.token }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Verify GHCR pull on target host
        if: inputs.validation-image != ''
        env:
          VALIDATION_IMAGE: ${{ inputs.validation-image }}
        run: |
          docker pull "$VALIDATION_IMAGE"

      - name: Summary
        run: |
          {
            echo "### GHCR Auth Synced"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Runner | \`${{ inputs.runner }}\` |"
            echo "| User | \`$(whoami)\` |"
            echo "| Bootstrapped From GitHub | \`${{ steps.ghcr.outputs.used_fallback }}\` |"
            echo "| Validation Image | \`${{ inputs.validation-image || 'n/a' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
