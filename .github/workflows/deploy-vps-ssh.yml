name: Deploy to VPS via SSH

on:
  workflow_call:
    inputs:
      remote-dir:
        description: "Remote working directory containing the compose project"
        required: true
        type: string
      compose-file:
        description: "Compose file path relative to remote-dir or absolute on the target host"
        required: false
        type: string
        default: "docker-compose.yml"
      compose-service:
        description: "Compose service name to pull and recreate"
        required: true
        type: string
      image-tag:
        description: "Optional image tag or full image ref to persist into the remote .env"
        required: false
        type: string
        default: ""
      image-tag-variable:
        description: "Env var name in the remote .env used by the compose file for image tags"
        required: false
        type: string
        default: "IMAGE_TAG"
      docker-pull:
        description: "Whether to run docker compose pull before recreate"
        required: false
        type: boolean
        default: true
      force-recreate:
        description: "Whether to force recreation when bringing the service up"
        required: false
        type: boolean
        default: true
      verify-url:
        description: "Optional URL to verify after deployment"
        required: false
        type: string
        default: ""
      expected-content-type:
        description: "Optional expected Content-Type substring for verification"
        required: false
        type: string
        default: ""
      expected-content:
        description: "Optional expected content in the verification response body"
        required: false
        type: string
        default: ""
      smoke-test-url:
        description: "Optional UI smoke-test URL"
        required: false
        type: string
        default: ""
      smoke-test-content:
        description: "Optional comma-separated expected strings for the smoke-test page"
        required: false
        type: string
        default: ""
      runner:
        description: "Preferred runner label"
        required: false
        type: string
        default: "oci-build-core"
      max-retries:
        description: "Verification retry attempts"
        required: false
        type: string
        default: "6"
      retry-delay:
        description: "Seconds between verification retries"
        required: false
        type: string
        default: "10"
      timeout:
        description: "curl timeout in seconds for verification"
        required: false
        type: string
        default: "15"
      vps-host-secret-name:
        description: "Doppler secret name containing the deploy target host"
        required: false
        type: string
        default: "VPS_HOST"
      vps-user-secret-name:
        description: "Doppler secret name containing the SSH username"
        required: false
        type: string
        default: "VPS_USER"
      vps-private-key-secret-name:
        description: "Doppler secret name containing the SSH private key"
        required: false
        type: string
        default: "VPS_SSH_KEY"
      vps-port-secret-name:
        description: "Doppler secret name containing the SSH port"
        required: false
        type: string
        default: "VPS_SSH_PORT"
      ghcr-username-secret-name:
        description: "Optional Doppler secret name containing the GHCR username for remote docker login"
        required: false
        type: string
        default: "GHCR_USERNAME"
      ghcr-token-secret-name:
        description: "Optional Doppler secret name containing the GHCR token/PAT for remote docker login"
        required: false
        type: string
        default: "GHCR_PAT"
    secrets:
      DOPPLER_TOKEN:
        required: true
      DEPLOY_DOPPLER_TOKEN:
        required: false

jobs:
  pick-runner:
    name: Pick runner
    timeout-minutes: 20
    uses: KombiverseLabs/.github/.github/workflows/pick-runner.yml@main
    with:
      preferred: ${{ inputs.runner }}
    secrets: inherit

  deploy:
    name: Deploy remote service
    needs: [pick-runner]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 10

    steps:
      - name: Install Doppler CLI
        run: |
          if command -v doppler >/dev/null 2>&1; then
            exit 0
          fi
          sudo mkdir -p /usr/share/keyrings
          curl -sLf --retry 3 --tlsv1.2 --proto "=https" \
            'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' \
            | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] \
            https://packages.doppler.com/public/cli/deb/debian any-version main" \
            | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          sudo apt-get update -qq && sudo apt-get install -y doppler

      - name: Resolve deploy secrets from Doppler
        id: doppler
        env:
          APP_DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DEPLOY_DOPPLER_TOKEN: ${{ secrets.DEPLOY_DOPPLER_TOKEN }}
          VPS_HOST_SECRET_NAME: ${{ inputs.vps-host-secret-name }}
          VPS_USER_SECRET_NAME: ${{ inputs.vps-user-secret-name }}
          VPS_PRIVATE_KEY_SECRET_NAME: ${{ inputs.vps-private-key-secret-name }}
          VPS_PORT_SECRET_NAME: ${{ inputs.vps-port-secret-name }}
          GHCR_USERNAME_SECRET_NAME: ${{ inputs.ghcr-username-secret-name }}
          GHCR_TOKEN_SECRET_NAME: ${{ inputs.ghcr-token-secret-name }}
        run: |
          set -euo pipefail
          RESOLVED_DOPPLER_TOKEN="${DEPLOY_DOPPLER_TOKEN:-${APP_DOPPLER_TOKEN:-}}"
          if [ -z "$RESOLVED_DOPPLER_TOKEN" ]; then
            echo "A Doppler token is required for remote deploy secret resolution." >&2
            exit 1
          fi
          DOPPLER_TOKEN="$RESOLVED_DOPPLER_TOKEN" doppler secrets download --no-file --format json > /tmp/doppler_vps_deploy.json

          python3 <<'PY'
          import json
          import os
          import sys

          with open('/tmp/doppler_vps_deploy.json', 'r', encoding='utf-8') as handle:
              secret_map = json.load(handle)

          required = {
              'ssh_host': os.environ['VPS_HOST_SECRET_NAME'],
              'ssh_user': os.environ['VPS_USER_SECRET_NAME'],
              'ssh_key': os.environ['VPS_PRIVATE_KEY_SECRET_NAME'],
          }

          values = {}
          missing = []
          for output_name, secret_name in required.items():
              value = str(secret_map.get(secret_name, '')).strip()
              if not value:
                  missing.append(secret_name)
              else:
                  values[output_name] = value

          if missing:
              print(f"Missing required Doppler secrets: {', '.join(missing)}", file=sys.stderr)
              raise SystemExit(1)

          port_secret = os.environ['VPS_PORT_SECRET_NAME']
          values['ssh_port'] = str(secret_map.get(port_secret, '')).strip() or '22'

          ghcr_username_secret = os.environ.get('GHCR_USERNAME_SECRET_NAME', '').strip()
          ghcr_token_secret = os.environ.get('GHCR_TOKEN_SECRET_NAME', '').strip()
          ghcr_username = str(secret_map.get(ghcr_username_secret, '')).strip() if ghcr_username_secret else ''
          ghcr_token = str(secret_map.get(ghcr_token_secret, '')).strip() if ghcr_token_secret else ''

          key_path = os.path.join(os.environ['RUNNER_TEMP'], 'deploy_vps_key')
          with open(key_path, 'w', encoding='utf-8') as handle:
              handle.write(values['ssh_key'])
              if not values['ssh_key'].endswith('\n'):
                  handle.write('\n')
          os.chmod(key_path, 0o600)

          if ghcr_username:
              print(f"::add-mask::{ghcr_username}")
          if ghcr_token:
              print(f"::add-mask::{ghcr_token}")

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              for key in ('ssh_host', 'ssh_user', 'ssh_port'):
                  print(f"{key}={values[key]}", file=handle)
              print(f"ssh_key_path={key_path}", file=handle)
              print(f"ghcr_username={ghcr_username}", file=handle)
              print(f"ghcr_token={ghcr_token}", file=handle)
          PY

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          install -m 600 "${{ steps.doppler.outputs.ssh_key_path }}" ~/.ssh/deploy_vps_key
          ssh-keyscan -p "${{ steps.doppler.outputs.ssh_port }}" -H "${{ steps.doppler.outputs.ssh_host }}" >> ~/.ssh/known_hosts

      - name: Pull and recreate compose service
        env:
          SSH_HOST: ${{ steps.doppler.outputs.ssh_host }}
          SSH_USER: ${{ steps.doppler.outputs.ssh_user }}
          SSH_PORT: ${{ steps.doppler.outputs.ssh_port }}
          REMOTE_DIR: ${{ inputs.remote-dir }}
          COMPOSE_FILE_INPUT: ${{ inputs.compose-file }}
          COMPOSE_SERVICE: ${{ inputs.compose-service }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          IMAGE_TAG_VARIABLE: ${{ inputs.image-tag-variable }}
          DOCKER_PULL: ${{ inputs.docker-pull }}
          FORCE_RECREATE: ${{ inputs.force-recreate }}
          GHCR_USERNAME: ${{ steps.doppler.outputs.ghcr_username }}
          GHCR_TOKEN: ${{ steps.doppler.outputs.ghcr_token }}
        run: |
          set -euo pipefail

          remote_dir_escaped=$(printf '%q' "$REMOTE_DIR")
          compose_file_escaped=$(printf '%q' "$COMPOSE_FILE_INPUT")
          service_escaped=$(printf '%q' "$COMPOSE_SERVICE")
          image_tag_escaped=$(printf '%q' "$IMAGE_TAG")
          image_tag_var_escaped=$(printf '%q' "$IMAGE_TAG_VARIABLE")
          docker_pull_escaped=$(printf '%q' "$DOCKER_PULL")
          force_recreate_escaped=$(printf '%q' "$FORCE_RECREATE")
          ghcr_username_escaped=$(printf '%q' "$GHCR_USERNAME")
          ghcr_token_escaped=$(printf '%q' "$GHCR_TOKEN")

          ssh -i ~/.ssh/deploy_vps_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "REMOTE_DIR=$remote_dir_escaped COMPOSE_FILE_INPUT=$compose_file_escaped COMPOSE_SERVICE=$service_escaped IMAGE_TAG=$image_tag_escaped IMAGE_TAG_VARIABLE=$image_tag_var_escaped DOCKER_PULL=$docker_pull_escaped FORCE_RECREATE=$force_recreate_escaped GHCR_USERNAME=$ghcr_username_escaped GHCR_TOKEN=$ghcr_token_escaped bash -s" <<'EOF'
          set -euo pipefail

          expand_path() {
            case "$1" in
              "~")
                printf '%s\n' "$HOME"
                ;;
              "~/"*)
                printf '%s/%s\n' "$HOME" "${1#"~/"}"
                ;;
              *)
                printf '%s\n' "$1"
                ;;
            esac
          }

          REMOTE_DIR="$(expand_path "$REMOTE_DIR")"
          COMPOSE_FILE_EXPANDED="$(expand_path "$COMPOSE_FILE_INPUT")"

          if [ "${COMPOSE_FILE_EXPANDED#/}" = "$COMPOSE_FILE_EXPANDED" ]; then
            COMPOSE_FILE="$REMOTE_DIR/$COMPOSE_FILE_EXPANDED"
          else
            COMPOSE_FILE="$COMPOSE_FILE_EXPANDED"
          fi

          cd "$REMOTE_DIR"

          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "Compose file not found: $COMPOSE_FILE" >&2
            exit 1
          fi

          compose_services_output="$(docker compose -f "$COMPOSE_FILE" config --services 2>&1 || true)"
          if ! printf '%s\n' "$compose_services_output" | grep -Fxq "$COMPOSE_SERVICE"; then
            echo "Compose service '$COMPOSE_SERVICE' not found in $COMPOSE_FILE" >&2
            printf '%s\n' "$compose_services_output"
            exit 1
          fi

          if [ -n "$IMAGE_TAG" ]; then
            env_file="$REMOTE_DIR/.env"
            resolved_tag="$IMAGE_TAG"
            backup_path=""

            if [ "${resolved_tag##*:}" != "$resolved_tag" ]; then
              resolved_tag="${resolved_tag##*:}"
            fi

            if [ -f "$env_file" ]; then
              backup_path="$env_file.bak.$(date +%s)"
              cp -p "$env_file" "$backup_path"
              echo "Backed up $env_file -> $backup_path"
            else
              : > "$env_file"
            fi

            tmp_file="$(mktemp)"
            awk -v key="$IMAGE_TAG_VARIABLE" -v val="$resolved_tag" '
              BEGIN { updated = 0 }
              index($0, key "=") == 1 { print key "=" val; updated = 1; next }
              { print }
              END { if (!updated) print key "=" val }
            ' "$env_file" > "$tmp_file"
            mv "$tmp_file" "$env_file"
            echo "Set $IMAGE_TAG_VARIABLE=$resolved_tag"
          fi

          if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          if [ "$DOCKER_PULL" = "true" ]; then
            docker compose -f "$COMPOSE_FILE" pull "$COMPOSE_SERVICE"
          fi

          if [ "$FORCE_RECREATE" = "true" ]; then
            docker compose -f "$COMPOSE_FILE" up -d --force-recreate "$COMPOSE_SERVICE"
          else
            docker compose -f "$COMPOSE_FILE" up -d "$COMPOSE_SERVICE"
          fi

          docker compose -f "$COMPOSE_FILE" ps "$COMPOSE_SERVICE"
          EOF

      - name: Verify deployment
        id: verify
        if: inputs.verify-url != ''
        uses: KombiverseLabs/.github/actions/verify-deployment@main
        with:
          url: ${{ inputs.verify-url }}
          expected-content-type: ${{ inputs.expected-content-type }}
          expected-content: ${{ inputs.expected-content }}
          smoke-test-url: ${{ inputs.smoke-test-url }}
          smoke-test-content: ${{ inputs.smoke-test-content }}
          max-retries: ${{ inputs.max-retries }}
          retry-delay: ${{ inputs.retry-delay }}
          timeout: ${{ inputs.timeout }}

      - name: Deployment summary
        if: always()
        run: |
          echo "### VPS Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Host** | \`${{ steps.doppler.outputs.ssh_host }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Remote dir** | \`${{ inputs.remote-dir }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Compose file** | \`${{ inputs.compose-file }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Service** | \`${{ inputs.compose-service }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image tag input** | \`${{ inputs.image-tag != '' && inputs.image-tag || 'unchanged' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.verify-url != '' }}" = "true" ]; then
            echo "| **Verify URL** | \`${{ inputs.verify-url }}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Verify status** | \`${{ steps.verify.outputs.status }}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **HTTP code** | \`${{ steps.verify.outputs.http-code }}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Level reached** | \`${{ steps.verify.outputs.level-reached }}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
