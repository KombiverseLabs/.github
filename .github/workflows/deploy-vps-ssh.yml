name: Deploy via SSH (VPS Docker Compose)
# SSH-based deployment to a VPS running Docker Compose.
# SSH credentials (host, user, private key) are fetched from Doppler.
# Supports both production (kombify-io/prd_infra) and dev (kombify-ionos-dev/dev) VPS.
# Used for services that cannot run on Render (e.g. kombify-Sim: requires Docker socket + privileged mode).

on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name for logging"
        required: true
        type: string
      compose-service:
        description: "Docker Compose service name to pull + restart"
        required: true
        type: string
      compose-dir:
        description: "Directory on VPS containing docker-compose.yml"
        required: false
        type: string
        default: "/opt/kombify-sim"
      compose-file-source:
        description: "Optional local compose file to upload before deployment"
        required: false
        type: string
        default: ""
      compose-file-destination:
        description: "Remote compose filename under compose-dir"
        required: false
        type: string
        default: "docker-compose.yml"
      runtime-env-project:
        description: "Optional Doppler project to materialize as remote runtime env"
        required: false
        type: string
        default: ""
      runtime-env-config:
        description: "Optional Doppler config to materialize as remote runtime env"
        required: false
        type: string
        default: ""
      runtime-env-file-destination:
        description: "Remote runtime env filename under compose-dir"
        required: false
        type: string
        default: ".env"
      health-check-url:
        description: "URL to probe after deployment"
        required: false
        type: string
      health-check-retries:
        description: "Number of health check retries"
        required: false
        type: number
        default: 12
      health-check-interval:
        description: "Seconds between health check retries"
        required: false
        type: number
        default: 10
      runner:
        description: "Runner label"
        required: false
        type: string
        default: "blacksmith-4vcpu-ubuntu-2204"
      doppler-project:
        description: "Doppler project containing VPS SSH credentials"
        required: false
        type: string
        default: "kombify-io"
      doppler-config:
        description: "Doppler config containing VPS SSH credentials"
        required: false
        type: string
        default: "prd_infra"
      ssh-host-key:
        description: "Secret key name for the target host/IP"
        required: false
        type: string
        default: "IONOS_VPS_HOST"
      ssh-user-key:
        description: "Secret key name for the SSH username"
        required: false
        type: string
        default: "IONOS_VPS_USER"
      ssh-private-key-key:
        description: "Secret key name for the SSH private key"
        required: false
        type: string
        default: "IONOS_SSH_PRIVATE_KEY"
      ssh-port-key:
        description: "Optional secret key name for the SSH port"
        required: false
        type: string
        default: ""
    secrets:
      DOPPLER_TOKEN:
        description: "Doppler token with access to VPS SSH credentials"
        required: true

# Kritischer Pfad: deploy (10) = 10 min max

jobs:
  deploy:
    name: "${{ inputs.service-name }} → VPS"
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        if: inputs.compose-file-source != ''

      - name: Install Doppler CLI
        shell: bash
        run: |
          if command -v doppler >/dev/null 2>&1; then exit 0; fi
          sudo mkdir -p /usr/share/keyrings
          if [ ! -f /usr/share/keyrings/doppler-archive-keyring.gpg ]; then
            curl -sLf --retry 3 --tlsv1.2 --proto "=https" \
              'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' \
              | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
          fi
          if [ ! -f /etc/apt/sources.list.d/doppler-cli.list ]; then
            echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] https://packages.doppler.com/public/cli/deb/debian any-version main" \
              | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          fi
          sudo apt-get update -qq && sudo apt-get install -y doppler

      - name: Deploy via SSH
        shell: bash
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DOPPLER_TOKEN:-}" ]; then
            echo "::error::DOPPLER_TOKEN is empty"
            exit 1
          fi

          doppler_secret() {
            local secret_name="$1"
            doppler secrets get "$secret_name" \
              --plain \
              --project "${{ inputs.doppler-project }}" \
              --config "${{ inputs.doppler-config }}" \
              --token "$DOPPLER_TOKEN" \
              --no-read-env
          }

          doppler_secret_optional() {
            local secret_name="$1"
            if [ -z "$secret_name" ]; then
              return 0
            fi
            doppler_secret "$secret_name"
          }

          VPS_HOST=$(doppler_secret "${{ inputs.ssh-host-key }}")
          VPS_USER=$(doppler_secret "${{ inputs.ssh-user-key }}")
          SSH_KEY=$(doppler_secret "${{ inputs.ssh-private-key-key }}")
          SSH_PORT=$(doppler_secret_optional "${{ inputs.ssh-port-key }}")
          SSH_PORT="${SSH_PORT:-22}"

          SSH_KEY_FILE=$(mktemp)
          DOPPLER_ENV_FILE=$(mktemp)
          chmod 600 "$SSH_KEY_FILE"
          printf '%s\n' "$SSH_KEY" > "$SSH_KEY_FILE"
          trap 'rm -f "$SSH_KEY_FILE" "$DOPPLER_ENV_FILE"' EXIT

          COMPOSE_DIR="${{ inputs.compose-dir }}"
          COMPOSE_SVC="${{ inputs.compose-service }}"
          COMPOSE_FILE_SOURCE="${{ inputs.compose-file-source }}"
          COMPOSE_FILE_DEST="${{ inputs.compose-file-destination }}"
          RUNTIME_ENV_PROJECT="${{ inputs.runtime-env-project }}"
          RUNTIME_ENV_CONFIG="${{ inputs.runtime-env-config }}"
          RUNTIME_ENV_DEST="${{ inputs.runtime-env-file-destination }}"
          RUNTIME_ENV_STAGE=".doppler-runtime.env"

          echo "Deploying $COMPOSE_SVC in $COMPOSE_DIR on ${VPS_USER}@${VPS_HOST}"

          if [ -n "$COMPOSE_FILE_SOURCE" ] || { [ -n "$RUNTIME_ENV_PROJECT" ] && [ -n "$RUNTIME_ENV_CONFIG" ]; }; then
            ssh -i "$SSH_KEY_FILE" \
              -p "$SSH_PORT" \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              "${VPS_USER}@${VPS_HOST}" \
              "mkdir -p ${COMPOSE_DIR}"
          fi

          if [ -n "$COMPOSE_FILE_SOURCE" ]; then
            if [ ! -f "$COMPOSE_FILE_SOURCE" ]; then
              echo "::error::compose file not found: $COMPOSE_FILE_SOURCE"
              exit 1
            fi

            scp -i "$SSH_KEY_FILE" \
              -P "$SSH_PORT" \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              "$COMPOSE_FILE_SOURCE" \
              "${VPS_USER}@${VPS_HOST}:${COMPOSE_DIR}/${COMPOSE_FILE_DEST}"
          fi

          if [ -n "$RUNTIME_ENV_PROJECT" ] && [ -n "$RUNTIME_ENV_CONFIG" ]; then
            doppler secrets download \
              --format env-no-quotes \
              --no-file \
              --project "$RUNTIME_ENV_PROJECT" \
              --config "$RUNTIME_ENV_CONFIG" \
              --token "$DOPPLER_TOKEN" \
              --no-read-env > "$DOPPLER_ENV_FILE"

            scp -i "$SSH_KEY_FILE" \
              -P "$SSH_PORT" \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -o ConnectTimeout=10 \
              "$DOPPLER_ENV_FILE" \
              "${VPS_USER}@${VPS_HOST}:${COMPOSE_DIR}/${RUNTIME_ENV_STAGE}"
          fi

          ssh -i "$SSH_KEY_FILE" \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            "${VPS_USER}@${VPS_HOST}" \
            "cd ${COMPOSE_DIR} && \
             if [ -n \"${RUNTIME_ENV_PROJECT}\" ] && [ -n \"${RUNTIME_ENV_CONFIG}\" ]; then \
               python3 - \"${RUNTIME_ENV_STAGE}\" \"${RUNTIME_ENV_DEST}\" <<'PY'
          from pathlib import Path
          import sys

          src = Path(sys.argv[1])
          dst = Path(sys.argv[2])

          def parse_env(path: Path) -> dict[str, str]:
              values: dict[str, str] = {}
              if not path.exists():
                  return values
              for raw_line in path.read_text().splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith('#') or '=' not in raw_line:
                      continue
                  key, value = raw_line.split('=', 1)
                  values[key] = value
              return values

          merged = parse_env(dst)
          merged.update(parse_env(src))
          dst.write_text(''.join(f'{key}={value}\n' for key, value in merged.items()))
          if src.exists():
              src.unlink()
          PY
             fi && \
             docker compose pull ${COMPOSE_SVC} && \
             docker compose up -d --no-deps --remove-orphans ${COMPOSE_SVC}"

      - name: Health check
        if: inputs.health-check-url != ''
        shell: bash
        run: |
          URL="${{ inputs.health-check-url }}"
          RETRIES=${{ inputs.health-check-retries }}
          INTERVAL=${{ inputs.health-check-interval }}

          echo "Health checking: $URL (max ${RETRIES} attempts, ${INTERVAL}s interval)"

          for i in $(seq 1 "$RETRIES"); do
            HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' --max-time 10 "$URL" 2>/dev/null || echo "000")
            echo "  Attempt $i/$RETRIES: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              echo "Health check passed"
              exit 0
            fi
            [ "$i" -lt "$RETRIES" ] && sleep "$INTERVAL"
          done

          echo "::error::Health check failed after $RETRIES attempts at $URL"
          exit 1
