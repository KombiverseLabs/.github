name: Cache Cleanup (Org-wide)

on:
  schedule:
    - cron: '0 4 * * 0'  # Every Sunday at 04:00 UTC
  workflow_dispatch:
    inputs:
      max_age_days:
        description: 'Delete caches older than N days'
        default: '7'
        type: string
      dry_run:
        description: 'Dry run (list but dont delete)'
        default: false
        type: boolean

env:
  MAX_AGE_DAYS: ${{ inputs.max_age_days || '7' }}
  DRY_RUN: ${{ inputs.dry_run || 'false' }}

jobs:
  cleanup:
    name: Clean stale caches
    runs-on: [self-hosted, kombify]
    steps:
      - name: Cleanup caches across all org repos
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail

          CUTOFF=$(date -d "-${MAX_AGE_DAYS} days" -u +%Y-%m-%dT%H:%M:%SZ)
          echo "## Cache Cleanup Report" >> "$GITHUB_STEP_SUMMARY"
          echo "Cutoff: ${MAX_AGE_DAYS} days (before $CUTOFF)" >> "$GITHUB_STEP_SUMMARY"
          echo "Dry run: $DRY_RUN" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          TOTAL_DELETED=0
          TOTAL_FREED_BYTES=0

          # Get all repos in org
          REPOS=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/KombiverseLabs/repos?per_page=100&type=all" \
            | python3 -c "import json,sys; [print(r['name']) for r in json.load(sys.stdin)]")

          for REPO in $REPOS; do
            REPO_DELETED=0
            REPO_FREED=0
            PAGE=1

            while true; do
              RESPONSE=$(curl -sf \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/KombiverseLabs/${REPO}/actions/caches?per_page=100&page=${PAGE}" 2>/dev/null || echo '{"actions_caches":[]}')

              CACHE_COUNT=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('actions_caches',[])))" 2>/dev/null || echo "0")

              if [ "$CACHE_COUNT" = "0" ]; then
                break
              fi

              # Process each cache
              echo "$RESPONSE" | python3 -c "
          import json, sys
          from datetime import datetime
          cutoff = datetime.fromisoformat('${CUTOFF}'.replace('Z','+00:00'))
          data = json.load(sys.stdin)
          for cache in data.get('actions_caches', []):
              last_used = cache.get('last_accessed_at', cache.get('created_at', ''))
              if last_used:
                  ts = datetime.fromisoformat(last_used.replace('Z','+00:00'))
                  if ts < cutoff:
                      print(f\"{cache['id']}|{cache['size_in_bytes']}|{cache['key']}\")
          " | while IFS='|' read -r CACHE_ID SIZE KEY; do
                if [ "$DRY_RUN" = "true" ]; then
                  echo "  [DRY] Would delete: $KEY ($(( SIZE / 1048576 )) MB)"
                else
                  curl -sf \
                    -X DELETE \
                    -H "Authorization: Bearer $GH_TOKEN" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/KombiverseLabs/${REPO}/actions/caches/${CACHE_ID}" 2>/dev/null || true
                fi
                REPO_DELETED=$((REPO_DELETED + 1))
                REPO_FREED=$((REPO_FREED + SIZE))
              done

              PAGE=$((PAGE + 1))
            done

            if [ "$REPO_DELETED" -gt 0 ]; then
              FREED_MB=$((REPO_FREED / 1048576))
              echo "| $REPO | $REPO_DELETED | ${FREED_MB} MB |" >> "$GITHUB_STEP_SUMMARY"
              TOTAL_DELETED=$((TOTAL_DELETED + REPO_DELETED))
              TOTAL_FREED_BYTES=$((TOTAL_FREED_BYTES + REPO_FREED))
            fi
          done

          TOTAL_FREED_MB=$((TOTAL_FREED_BYTES / 1048576))
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: ${TOTAL_DELETED} caches deleted, ${TOTAL_FREED_MB} MB freed**" >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "Cleanup complete: ${TOTAL_DELETED} caches deleted, ${TOTAL_FREED_MB} MB freed"