name: Preview Smoke Gate
# Reusable workflow that runs a smoke test against a Render PR-preview
# deployment and posts a "preview-smoke-passed" check run on the PR head SHA.
#
# Wire this into each Render-Tier-3 repo's .github/workflows/pr-preview-smoke.yml
# as a caller. Then add "preview-smoke-passed" to the repo's
# kombify-main-protection ruleset required_status_checks. PRs cannot merge
# until the check run is green.
#
# Required for repos using autoDeployTrigger=checksPass (kombify-AI today;
# DEPLOYMENT-STANDARD §12 R4 condition 4) so that an unverified preview
# does not promote to production via checksPass auto-deploy.
#
# Strongly recommended for all other Render-Tier-3 repos as defense in
# depth on top of the human reviewer checklist (§12 R5).

on:
  workflow_call:
    inputs:
      service-name:
        description: |
          Render service name to filter deployments by environment substring.
          E.g. "kombify-cloud-native". When multiple services post against the
          same PR, this picks the right one.
        required: true
        type: string
      health-path:
        description: "Path to GET on the preview URL. Default /health."
        required: false
        type: string
        default: "/health"
      max-attempts:
        description: "Number of health-check retries with 15s spacing."
        required: false
        type: number
        default: 12
      runner:
        description: "Runner label"
        required: false
        type: string
        default: "blacksmith-2vcpu-ubuntu-2204"

permissions:
  checks: write
  deployments: read
  contents: read
  pull-requests: read

jobs:
  smoke:
    name: Preview Smoke
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    steps:
      - name: Resolve PR head SHA + preview URL
        id: resolve
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          SERVICE: ${{ inputs.service-name }}
        with:
          script: |
            const event = context.eventName;
            if (event !== "deployment_status") {
              core.info(`Event=${event}; smoke runs only on deployment_status. Skipping.`);
              core.setOutput("skip", "true");
              return;
            }
            const dep = context.payload.deployment;
            const status = context.payload.deployment_status;
            if (!dep || !status) {
              core.info("Missing deployment/status payload; skipping.");
              core.setOutput("skip", "true");
              return;
            }
            if (status.state !== "success") {
              core.info(`Deployment status=${status.state}; only 'success' triggers smoke. Skipping.`);
              core.setOutput("skip", "true");
              return;
            }
            const env = (dep.environment || "").toLowerCase();
            const filter = (process.env.SERVICE || "").toLowerCase();
            if (filter && !env.includes(filter)) {
              core.info(`Deployment env='${env}' does not match service filter '${filter}'. Skipping.`);
              core.setOutput("skip", "true");
              return;
            }
            const url = status.environment_url || status.target_url;
            if (!url) {
              core.info("No environment_url on deployment status; skipping.");
              core.setOutput("skip", "true");
              return;
            }
            // Find the open PR whose head equals the deployment SHA.
            const sha = dep.sha;
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            const open = pulls.find((p) => p.state === "open");
            if (!open) {
              core.info(`No open PR for SHA ${sha}; skipping smoke (production deploys validate via deploy.yml).`);
              core.setOutput("skip", "true");
              return;
            }
            core.setOutput("sha", sha);
            core.setOutput("url", url);
            core.setOutput("env", dep.environment);
            core.setOutput("pr", String(open.number));

      - name: Health-check the preview URL
        id: smoke
        if: steps.resolve.outputs.skip != 'true'
        shell: bash
        env:
          URL: ${{ steps.resolve.outputs.url }}
          HEALTH_PATH: ${{ inputs.health-path }}
          MAX_ATTEMPTS: ${{ inputs.max-attempts }}
        run: |
          set -euo pipefail
          base="${URL%/}"
          target="${base}${HEALTH_PATH}"
          attempts="${MAX_ATTEMPTS:-12}"
          for i in $(seq 1 "$attempts"); do
            if curl -fsS --max-time 15 "$target" >/dev/null; then
              echo "Preview health OK at $target (attempt $i/$attempts)."
              echo "ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Preview health attempt $i/$attempts failed; retrying in 15s..." >&2
            sleep 15
          done
          echo "::error::Preview health-check failed after $attempts attempts on $target"
          echo "ok=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Post preview-smoke-passed check run
        if: always() && steps.resolve.outputs.skip != 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          SHA: ${{ steps.resolve.outputs.sha }}
          URL: ${{ steps.resolve.outputs.url }}
          ENV: ${{ steps.resolve.outputs.env }}
          OK: ${{ steps.smoke.outputs.ok }}
        with:
          script: |
            const sha = process.env.SHA;
            const ok = process.env.OK === "true";
            const conclusion = ok ? "success" : "failure";
            const summary = ok
              ? `Preview health endpoint reachable at ${process.env.URL} (env=${process.env.ENV}).`
              : `Preview health endpoint failed for ${process.env.URL} (env=${process.env.ENV}). Re-push to retry.`;
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: "preview-smoke-passed",
              head_sha: sha,
              status: "completed",
              conclusion,
              output: {
                title: ok ? "Preview smoke passed" : "Preview smoke failed",
                summary,
              },
            });
