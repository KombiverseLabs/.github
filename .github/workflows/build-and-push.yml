# Reusable workflow: Build Docker image and push to GHCR
# Called by individual repos as part of their deploy pipeline
name: Build and Push to GHCR

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Image name (e.g., kombify-api). Defaults to repo name.'
        required: false
        type: string
        default: ''
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      build-args:
        description: 'Docker build args (multiline KEY=VALUE)'
        required: false
        type: string
        default: ''
      platforms:
        description: 'Target platforms'
        required: false
        type: string
        default: 'linux/amd64'
      tag-prefix:
        description: 'Tag prefix (e.g., staging-)'
        required: false
        type: string
        default: ''
      push:
        description: 'Push to registry'
        required: false
        type: boolean
        default: true
      runner:
        description: 'Preferred runner label. Passed into fallback chain: self-hosted → Blacksmith → ubuntu-latest.'
        required: false
        type: string
        default: ''
    secrets:
      GH_PAT:
        required: false
    outputs:
      image:
        description: 'Full image reference with SHA tag'
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: 'Image digest'
        value: ${{ jobs.build.outputs.digest }}

jobs:
  pick-runner:
    name: Pick runner
    uses: KombiverseLabs/.github/.github/workflows/pick-runner.yml@main
    with:
      preferred: ${{ inputs.runner || 'kombify-ionos' }}
    secrets: inherit

  build:
    needs: [pick-runner]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.single-tag.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name
        id: image-name
        run: |
          if [ -n "${{ inputs.image-name }}" ]; then
            echo "name=ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}" >> $GITHUB_OUTPUT
          else
            echo "name=ghcr.io/${{ github.repository }}" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-name.outputs.name }}
          tags: |
            type=sha,prefix=${{ inputs.tag-prefix }}
            type=raw,value=${{ inputs.tag-prefix }}latest
            type=ref,event=branch,prefix=${{ inputs.tag-prefix }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          secrets: |
            GITHUB_TOKEN=${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract single deploy tag
        id: single-tag
        run: |
          SHA_TAG=$(echo "${{ steps.meta.outputs.tags }}" | grep "sha-" | head -1)
          if [ -z "$SHA_TAG" ]; then
            SHA_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          fi
          echo "image=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "Deploy tag: $SHA_TAG"

      - name: Summary
        run: |
          echo "### Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.image-name.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Runner:** \`${{ needs.pick-runner.outputs.runner }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
