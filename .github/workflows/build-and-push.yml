# Reusable workflow: Build Docker image and push to GHCR
# Called by individual repos as part of their deploy pipeline
name: Build and Push to GHCR

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Image name (e.g., kombify-gateway). Defaults to repo name.'
        required: false
        type: string
        default: ''
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      build-args:
        description: 'Docker build args (multiline KEY=VALUE)'
        required: false
        type: string
        default: ''
      doppler-build-secrets:
        description: 'Multiline list of Doppler secrets to expose to Docker as BuildKit secrets. Supports TARGET=PRIMARY|FALLBACK alias syntax.'
        required: false
        type: string
        default: ''
      doppler-runtime-env-secret-id:
        description: 'Optional BuildKit secret id populated with a shell export file containing all Doppler secrets for baking runtime env into the image.'
        required: false
        type: string
        default: ''
      platforms:
        description: 'Target platforms'
        required: false
        type: string
        default: 'linux/amd64'
      tag-prefix:
        description: 'Tag prefix (e.g., staging-)'
        required: false
        type: string
        default: ''
      push:
        description: 'Push to registry'
        required: false
        type: boolean
        default: true
      runner:
        description: 'Preferred runner label. Defaults to the shared OCI self-hosted runner label.'
        required: false
        type: string
        default: ''
    secrets:
      GH_PAT:
        required: false
      DOPPLER_TOKEN:
        required: false
    outputs:
      image:
        description: 'Full image reference with SHA tag'
        value: ${{ jobs.build.outputs.image }}
      image_tag:
        description: 'Resolved deploy tag'
        value: ${{ jobs.build.outputs.image_tag }}
      image_repository:
        description: 'Resolved image repository'
        value: ${{ jobs.build.outputs.image_repository }}
      digest:
        description: 'Image digest'
        value: ${{ jobs.build.outputs.digest }}

jobs:
  pick-runner:
    name: Pick runner
    uses: KombiverseLabs/.github/.github/workflows/pick-runner.yml@main
    with:
      preferred: ${{ inputs.runner || 'kombi' }}
    secrets: inherit

  build:
    needs: [pick-runner]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.single-tag.outputs.image }}
      image_tag: ${{ steps.deploy-ref.outputs.image_tag }}
      image_repository: ${{ steps.deploy-ref.outputs.image_repository }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Doppler CLI
        if: inputs.doppler-build-secrets != '' || inputs.doppler-runtime-env-secret-id != ''
        run: |
          if command -v doppler >/dev/null 2>&1; then
            exit 0
          fi
          curl -sLf --retry 3 --tlsv1.2 --proto "=https" \
            'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' \
            | sudo gpg --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] \
            https://packages.doppler.com/public/cli/deb/debian any-version main" \
            | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          sudo apt-get update -qq && sudo apt-get install -y doppler

      - name: Resolve Doppler build secrets
        if: inputs.doppler-build-secrets != ''
        id: doppler-build-secrets
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          REQUESTED_SECRETS: ${{ inputs.doppler-build-secrets }}
        run: |
          if [ -z "$DOPPLER_TOKEN" ]; then
            echo "DOPPLER_TOKEN is required when doppler-build-secrets is set" >&2
            exit 1
          fi

          doppler secrets download --no-file --format json > /tmp/doppler-build-secrets.json

          python3 <<'PYEOF'
          import json
          import os
          import sys

          requested = [line.strip() for line in os.environ['REQUESTED_SECRETS'].splitlines() if line.strip()]
          with open('/tmp/doppler-build-secrets.json', 'r', encoding='utf-8') as handle:
              secret_map = json.load(handle)

          resolved = []
          missing = []

          for item in requested:
              if '=' in item:
                  target, candidates = item.split('=', 1)
                  target = target.strip()
                  candidate_names = [name.strip() for name in candidates.split('|') if name.strip()]
              else:
                  target = item
                  candidate_names = [item]

              value = next((str(secret_map.get(name, '')).strip() for name in candidate_names if str(secret_map.get(name, '')).strip()), '')
              if not value:
                  missing.append(item)
                  continue

              resolved.append((target, value))

          if missing:
              print(f"Missing required Doppler build secrets: {', '.join(missing)}", file=sys.stderr)
              raise SystemExit(1)

          lines = []
          for target, value in resolved:
              print(f"::add-mask::{value}")
              lines.append(f"{target}={value}")

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              print('docker_secrets<<EOF', file=handle)
              print('\n'.join(lines), file=handle)
              print('EOF', file=handle)
          PYEOF

      - name: Resolve Doppler runtime env
        if: inputs.doppler-runtime-env-secret-id != ''
        id: doppler-runtime-env
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          SECRET_ID: ${{ inputs.doppler-runtime-env-secret-id }}
        run: |
          if [ -z "$DOPPLER_TOKEN" ]; then
            echo "DOPPLER_TOKEN is required when doppler-runtime-env-secret-id is set" >&2
            exit 1
          fi

          doppler secrets download --no-file --format json > /tmp/doppler-runtime-env.json

          python3 <<'PYEOF'
          import json
          import os
          import re
          import sys

          skip = {
              'DOPPLER_CONFIG',
              'DOPPLER_ENVIRONMENT',
              'DOPPLER_PROJECT',
              'DOPPLER_TOKEN_ENVIRONMENT',
              'DOPPLER_TOKEN_PROJECT',
          }

          def shell_quote(value: str) -> str:
              return "'" + value.replace("'", "'\"'\"'") + "'"

          with open('/tmp/doppler-runtime-env.json', 'r', encoding='utf-8') as handle:
              secret_map = json.load(handle)

          secret_id = os.environ['SECRET_ID']
          if not re.fullmatch(r'[A-Za-z0-9][A-Za-z0-9_.-]*', secret_id):
              print(f'Invalid BuildKit secret id: {secret_id}', file=sys.stderr)
              raise SystemExit(1)

          path = '/tmp/doppler-runtime-env.sh'
          with open(path, 'w', encoding='utf-8') as handle:
              handle.write('#!/bin/sh\n')
              for key in sorted(secret_map):
                  if key in skip:
                      continue
                  if not re.fullmatch(r'[A-Za-z_][A-Za-z0-9_]*', key):
                      print(f'Invalid env key for runtime export: {key}', file=sys.stderr)
                      raise SystemExit(1)
                  value = secret_map[key]
                  if value is None:
                      value = ''
                  handle.write(f'export {key}={shell_quote(str(value))}\n')
          os.chmod(path, 0o600)

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              print('docker_secret_file<<EOF', file=handle)
              print(f'{secret_id}={path}', file=handle)
              print('EOF', file=handle)
          PYEOF

      - name: Warm BuildKit image
        run: |
          if docker image inspect moby/buildkit:buildx-stable-1 >/dev/null 2>&1; then
            exit 0
          fi

          for attempt in 1 2 3 4 5; do
            if docker pull moby/buildkit:buildx-stable-1 && docker image inspect moby/buildkit:buildx-stable-1 >/dev/null 2>&1; then
              exit 0
            fi
            echo "BuildKit image pull attempt ${attempt} failed; retrying in 10s"
            sleep 10
          done

          echo "Failed to cache moby/buildkit:buildx-stable-1 on the runner" >&2
          exit 1

      - name: Prepare local build cache
        id: local-cache
        run: |
          CACHE_ROOT="${KOMBIFY_BUILDX_CACHE_ROOT:-/var/lib/kombify-buildx-cache}"
          if ! mkdir -p "$CACHE_ROOT" >/dev/null 2>&1; then
            CACHE_ROOT="${HOME}/.cache/kombify-buildx-cache"
            mkdir -p "$CACHE_ROOT"
          fi
          REPO_SLUG="${GITHUB_REPOSITORY//\//-}"
          CACHE_KEY="${{ inputs.image-name }}"
          if [ -z "$CACHE_KEY" ]; then
            CACHE_KEY="${{ inputs.dockerfile }}"
          fi
          CACHE_KEY="${CACHE_KEY//\//-}"
          CACHE_KEY="${CACHE_KEY//:/-}"
          CACHE_KEY="${CACHE_KEY// /-}"
          CACHE_DIR="${CACHE_ROOT}/${REPO_SLUG}/${CACHE_KEY}"
          CACHE_NEW_DIR="${CACHE_DIR}-${GITHUB_RUN_ID:-manual}-${GITHUB_JOB:-build}-new"

          mkdir -p "$CACHE_DIR" "$CACHE_NEW_DIR"

          echo "cache_dir=$CACHE_DIR" >> "$GITHUB_OUTPUT"
          echo "cache_new_dir=$CACHE_NEW_DIR" >> "$GITHUB_OUTPUT"

      - name: Clean stale BuildKit temp data
        run: |
          rm -rf /tmp/buildkitd-config* /tmp/buildx-* 2>/dev/null || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}

      - name: Determine image name
        id: image-name
        run: |
          if [ -n "${{ inputs.image-name }}" ]; then
            echo "name=ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}" >> $GITHUB_OUTPUT
          else
            echo "name=ghcr.io/${{ github.repository }}" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image-name.outputs.name }}
          tags: |
            type=raw,value=${{ inputs.tag-prefix }}git-${{ github.sha }}
            type=sha,prefix=${{ inputs.tag-prefix }}
            type=raw,value=${{ inputs.tag-prefix }}latest
            type=ref,event=branch,prefix=${{ inputs.tag-prefix }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          secrets: |
            GITHUB_TOKEN=${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
            ${{ steps.doppler-build-secrets.outputs.docker_secrets }}
          secret-files: |
            ${{ steps.doppler-runtime-env.outputs.docker_secret_file }}
          cache-from: type=local,src=${{ steps.local-cache.outputs.cache_dir }}
          cache-to: type=local,dest=${{ steps.local-cache.outputs.cache_new_dir }},mode=max
          provenance: false
          sbom: false

      - name: Finalize local build cache
        if: always()
        run: |
          CACHE_DIR="${{ steps.local-cache.outputs.cache_dir }}"
          CACHE_NEW_DIR="${{ steps.local-cache.outputs.cache_new_dir }}"

          if [ -d "$CACHE_NEW_DIR" ]; then
            if [ "$(find "$CACHE_NEW_DIR" -mindepth 1 -maxdepth 1 | wc -l)" -gt 0 ]; then
              rm -rf "$CACHE_DIR"
              mv "$CACHE_NEW_DIR" "$CACHE_DIR"
            else
              rm -rf "$CACHE_NEW_DIR"
            fi
          fi

      - name: Extract single deploy tag
        id: single-tag
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          select_tag() {
            pattern="$1"
            printf '%s\n' "$ALL_TAGS" \
              | while IFS= read -r ref; do
                  [ -z "$ref" ] && continue
                  tag="${ref##*:}"
                  if printf '%s' "$tag" | grep -Eq "$pattern"; then
                    printf '%s\n' "$ref"
                  fi
                done \
              | tail -1
          }

          COMMIT_TAG=$(select_tag '^([A-Za-z0-9_.-]+-)?git-[0-9a-f]{7,40}$')
          if [ -z "$COMMIT_TAG" ]; then
            COMMIT_TAG=$(select_tag '^([A-Za-z0-9_.-]+-)?[0-9a-f]{7,40}$')
          fi
          if [ -z "$COMMIT_TAG" ]; then
            COMMIT_TAG=$(printf '%s\n' "$ALL_TAGS" | tail -1)
          fi

          if [ -z "$COMMIT_TAG" ]; then
            echo "Unable to determine deploy tag from Docker metadata output" >&2
            exit 1
          fi

          echo "image=$COMMIT_TAG" >> "$GITHUB_OUTPUT"
          echo "Deploy tag: $COMMIT_TAG"

      - name: Extract deploy repository and tag
        id: deploy-ref
        run: |
          IMAGE_REF="${{ steps.single-tag.outputs.image }}"
          IMAGE_REPOSITORY="${IMAGE_REF%:*}"
          IMAGE_TAG="${IMAGE_REF##*:}"
          echo "image_repository=$IMAGE_REPOSITORY" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Deploy repository: $IMAGE_REPOSITORY"
          echo "Deploy tag: $IMAGE_TAG"

      - name: Summary
        run: |
          echo "### Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.image-name.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Runner:** \`${{ needs.pick-runner.outputs.runner }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
