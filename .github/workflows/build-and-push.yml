# Reusable workflow: Build Docker image and push to GHCR
# Called by individual repos after CI passes
name: Build and Push to GHCR

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Image name (e.g., kombify-api). Defaults to repo name.'
        required: false
        type: string
        default: ''
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      build-args:
        description: 'Docker build args (multiline KEY=VALUE)'
        required: false
        type: string
        default: ''
      platforms:
        description: 'Target platforms'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      tag-prefix:
        description: 'Tag prefix (e.g., staging-)'
        required: false
        type: string
        default: ''
      push:
        description: 'Push to registry'
        required: false
        type: boolean
        default: true
      push-to-acr:
        description: 'Also push to Azure Container Registry (dual-registry fallback)'
        required: false
        type: boolean
        default: false
      acr-name:
        description: 'ACR name (e.g., acrkombifyprod). Used when push-to-acr is true.'
        required: false
        type: string
        default: 'acrkombifyprod'
      acr-image-name:
        description: 'Image name in ACR (defaults to image-name input)'
        required: false
        type: string
        default: ''
    secrets:
      ACR_USERNAME:
        required: false
      ACR_PASSWORD:
        required: false
      GH_PAT:
        required: false
    outputs:
      image:
        description: 'Full image reference with SHA tag'
        value: ${{ jobs.build.outputs.image }}
      digest:
        description: 'Image digest'
        value: ${{ jobs.build.outputs.digest }}
      acr-image:
        description: 'Full ACR image reference (if pushed)'
        value: ${{ jobs.build.outputs.acr_image }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
      acr_image: ${{ steps.acr-push.outputs.acr_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name
        id: image-name
        run: |
          if [ -n "${{ inputs.image-name }}" ]; then
            echo "name=ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}" >> $GITHUB_OUTPUT
          else
            echo "name=ghcr.io/${{ github.repository }}" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-name.outputs.name }}
          tags: |
            type=sha,prefix=${{ inputs.tag-prefix }}
            type=raw,value=${{ inputs.tag-prefix }}latest
            type=ref,event=branch,prefix=${{ inputs.tag-prefix }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          secrets: |
            GITHUB_TOKEN=${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to ACR
        if: inputs.push && inputs.push-to-acr
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.acr-name }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Cross-push to ACR
        id: acr-push
        if: inputs.push && inputs.push-to-acr
        run: |
          ACR_REGISTRY="${{ inputs.acr-name }}.azurecr.io"
          ACR_IMG_NAME="${{ inputs.acr-image-name }}"
          if [ -z "$ACR_IMG_NAME" ]; then
            ACR_IMG_NAME="${{ inputs.image-name }}"
          fi
          if [ -z "$ACR_IMG_NAME" ]; then
            ACR_IMG_NAME="$(basename ${{ github.repository }})"
          fi

          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          GHCR_REF="${{ steps.image-name.outputs.name }}:${{ inputs.tag-prefix }}sha-${SHA_SHORT}"
          ACR_SHA_TAG="${ACR_REGISTRY}/${ACR_IMG_NAME}:sha-${SHA_SHORT}"
          ACR_LATEST_TAG="${ACR_REGISTRY}/${ACR_IMG_NAME}:${{ inputs.tag-prefix }}latest"

          echo "Cross-tagging GHCR → ACR"
          echo "  Source: $GHCR_REF"
          echo "  Target: $ACR_SHA_TAG, $ACR_LATEST_TAG"

          docker buildx imagetools create \
            --tag "$ACR_SHA_TAG" \
            --tag "$ACR_LATEST_TAG" \
            "$GHCR_REF" || echo "::warning::ACR cross-push failed (non-blocking)"

          echo "acr_image=$ACR_SHA_TAG" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "### Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**GHCR Image:** \`${{ steps.image-name.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.acr-push.outputs.acr_image }}" ]; then
            echo "**ACR Image:** \`${{ steps.acr-push.outputs.acr_image }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
