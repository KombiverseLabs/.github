name: Setup Runner 2 on srv1161760
# One-shot workflow: run this manually to register a second parallel runner.
# Runs on the existing srv1161760-labs runner, creates a second runner dir,
# registers it as srv1161760-labs-2, and installs a systemd service.

on:
  workflow_dispatch:
    inputs:
      reg-token:
        description: "Runner registration token (generate with: gh api -X POST orgs/KombiverseLabs/actions/runners/registration-token --jq .token)"
        required: true
        type: string

jobs:
  setup:
    name: Bootstrap second runner
    runs-on: srv1161760-labs
    timeout-minutes: 10
    steps:
      - name: Install runner 2
        env:
          REG_TOKEN: ${{ inputs.reg-token }}
        run: |
          set -euo pipefail

          RUNNER_DIR="$HOME/runners/kombiverse-labs-2"
          RUNNER_VERSION="2.323.0"

          echo "=== Creating runner directory ==="
          mkdir -p "$RUNNER_DIR"

          echo "=== Downloading runner package ==="
          if [ ! -f "$RUNNER_DIR/run.sh" ]; then
            curl -sL "https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz" \
              | tar -xz -C "$RUNNER_DIR"
          else
            echo "Runner binary already present, skipping download"
          fi

          cd "$RUNNER_DIR"

          echo "=== Configuring runner ==="
          # Remove old config if present (--replace handles re-registration)
          ./config.sh \
            --url "https://github.com/KombiverseLabs" \
            --token "$REG_TOKEN" \
            --name "srv1161760-labs-2" \
            --labels "self-hosted,Linux,X64,srv1161760,kombify,srv1161760-labs,srv1161760-labs-2" \
            --runnergroup "Default" \
            --work "$RUNNER_DIR/_work" \
            --unattended \
            --replace

          echo "=== Installing systemd service ==="
          # svc.sh must be run from inside the runner directory
          sudo ./svc.sh install soul
          sudo systemctl daemon-reload
          sudo systemctl enable "actions.runner.KombiverseLabs.srv1161760-labs-2.service"
          sudo systemctl start  "actions.runner.KombiverseLabs.srv1161760-labs-2.service"
          echo "=== Done ==="
          sudo systemctl status "actions.runner.KombiverseLabs.srv1161760-labs-2.service" | head -12
