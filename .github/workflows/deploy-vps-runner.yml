# Reusable workflow: Deploy to VPS via self-hosted runner
# Runner is already on the target server, no SSH needed
name: Deploy to VPS (Self-Hosted Runner)

on:
  workflow_call:
    inputs:
      runner-label:
        description: 'Self-hosted runner label (e.g., vps-prod-1, kombify-vps)'
        required: true
        type: string
      compose-file:
        description: 'Path to docker-compose file in the repo (e.g., deploy/docker-compose.prod.yml)'
        required: true
        type: string
      service-name:
        description: 'Service identifier for deploy directory'
        required: true
        type: string
      image-tag:
        description: 'Image tag to deploy'
        required: false
        type: string
        default: 'latest'
      health-check-url:
        description: 'URL to check after deployment (empty to skip)'
        required: false
        type: string
        default: ''
      health-check-path:
        description: 'Health check path'
        required: false
        type: string
        default: '/health'
      pre-deploy-command:
        description: 'Command to run before docker-compose up'
        required: false
        type: string
        default: ''
      doppler-project:
        description: 'Doppler project name'
        required: false
        type: string
        default: ''
      doppler-config:
        description: 'Doppler config (prd, stg, dev)'
        required: false
        type: string
        default: 'prd'
    secrets:
      DOPPLER_TOKEN:
        required: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - ${{ inputs.runner-label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          DEPLOY_DIR="$HOME/kombify/${{ inputs.service-name }}"
          mkdir -p "$DEPLOY_DIR"
          cp "${{ inputs.compose-file }}" "$DEPLOY_DIR/docker-compose.yml"

          if [ -f "deploy/health-check.sh" ]; then
            cp deploy/health-check.sh "$DEPLOY_DIR/health-check.sh"
            chmod +x "$DEPLOY_DIR/health-check.sh"
          fi

          echo "deploy_dir=$DEPLOY_DIR" >> $GITHUB_ENV

      - name: Inject secrets from Doppler
        if: inputs.doppler-project != ''
        run: |
          cd "${{ env.deploy_dir }}"

          if command -v doppler &> /dev/null; then
            DOPPLER_TOKEN="${{ secrets.DOPPLER_TOKEN }}" \
              doppler secrets download \
              --project "${{ inputs.doppler-project }}" \
              --config "${{ inputs.doppler-config }}" \
              --format env \
              --no-file > .env
            echo "Secrets injected from Doppler"
          else
            echo "::error::Doppler CLI not installed on this runner"
            exit 1
          fi

      - name: Run pre-deploy command
        if: inputs.pre-deploy-command != ''
        run: |
          cd "${{ env.deploy_dir }}"
          ${{ inputs.pre-deploy-command }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        run: |
          cd "${{ env.deploy_dir }}"

          export IMAGE_TAG="${{ inputs.image-tag }}"

          # Pull new images
          docker compose pull

          # Deploy with zero-downtime
          docker compose up -d --remove-orphans

          # Safe image retention: keep last 5 images, remove older ones
          # DO NOT use 'docker image prune -f' -- it destroys fallback images!
          echo "Cleaning old images (keeping last 5)..."
          docker images --format '{{.Repository}}:{{.Tag}} {{.CreatedAt}}' \
            | grep -i "${{ inputs.service-name }}" \
            | sort -k2 -r \
            | tail -n +6 \
            | awk '{print $1}' \
            | xargs -r docker rmi 2>/dev/null || true

          echo "Deployment complete on $(hostname)"

      - name: Health check
        if: inputs.health-check-url != ''
        run: |
          echo "Checking health at ${{ inputs.health-check-url }}${{ inputs.health-check-path }}"

          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ inputs.health-check-url }}${{ inputs.health-check-path }}" || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "303" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/10: HTTP $STATUS - waiting 10s..."
            sleep 10
          done

          echo "::error::Health check failed after 10 attempts"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "### VPS Deployment (Self-Hosted Runner)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | \`${{ inputs.runner-label }}\` (\`$(hostname)\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | \`${{ inputs.service-name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ inputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deploy Dir** | \`${{ env.deploy_dir }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
