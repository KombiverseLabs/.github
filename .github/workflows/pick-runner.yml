# Reusable: Runtime runner selection.
#
# HOW IT WORKS
# ────────────
# The `pick` job runs ON the preferred runner itself (srv1161760-labs by
# default).  This guarantees that runner selection NEVER consumes
# GitHub-hosted minutes — an exhausted Actions budget can never block
# the pipeline.
#
# If the preferred runner is offline the job queues until it recovers.
# It will NOT fall back to a hosted runner automatically; automatic
# fallback to ubuntu-latest would re-introduce hosted-minute consumption
# and break builds whenever the budget is zero.
#
# To explicitly use a cloud runner, pass preferred: 'ubuntu-latest'.
# That is a conscious, per-caller decision that accepts budget dependency.
#
# Chain (default): srv1161760-labs (self-hosted, zero billed minutes)
# NOTE: kombify-ionos is the production host — never add it to this chain.
name: Pick Runner

on:
  workflow_call:
    inputs:
      preferred:
        description: 'Runner label to use. Defaults to srv1161760-labs (self-hosted).'
        required: false
        type: string
        default: 'srv1161760-labs'
    secrets:
      GH_PAT:
        required: false
    outputs:
      runner:
        description: 'The selected runner label to use in subsequent jobs'
        value: ${{ jobs.pick.outputs.runner }}

jobs:
  pick:
    name: Select runner
    # Run ON the preferred runner so this job itself never consumes
    # GitHub-hosted minutes.  Budget exhaustion cannot block the pipeline.
    runs-on: ${{ inputs.preferred || 'srv1161760-labs' }}
    timeout-minutes: 5
    outputs:
      runner: ${{ steps.select.outputs.runner }}
    steps:
      - name: Output selected runner
        id: select
        run: |
          RUNNER="${{ inputs.preferred || 'srv1161760-labs' }}"
          echo "runner=$RUNNER" >> "$GITHUB_OUTPUT"
          echo "→ Selected: $RUNNER"
