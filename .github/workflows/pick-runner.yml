# Reusable: Runtime runner selection.
#
# HOW IT WORKS
# ────────────
# The `pick` job runs ON the preferred runner label itself (`kombi` by
# default). All self-hosted runners share the unified `kombi` label.
#
# Runner landscape (2026-03-28):
# - `kombi` (primary)   → 4 dedicated runners on kombi-server (kombi-runner-1..4)
# - `kombi`             → Marcel's PC (2 runners, docker-desktop-1/2)
# - `kombi`             → srv1161760 (2 runners, srv1161760-labs/labs-2)
# - `ubuntu-latest`     → GitHub Hosted fallback (uses minutes, avoid)
#
# To explicitly use another runner class, pass `preferred` from the caller.
#
# NOTE: `kombify-ionos` is the production host — never use it as CI capacity.
name: Pick Runner

on:
  workflow_call:
    inputs:
      preferred:
        description: 'Runner label to use. Defaults to kombi.'
        required: false
        type: string
        default: 'kombi'
    secrets:
      GH_PAT:
        required: false
    outputs:
      runner:
        description: 'The selected runner label to use in subsequent jobs'
        value: ${{ jobs.pick.outputs.runner }}

jobs:
  pick:
    name: Select runner
    runs-on: ${{ inputs.preferred || 'kombi' }}
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.select.outputs.runner }}
    steps:
      - name: Output selected runner
        id: select
        run: |
          RUNNER="${{ inputs.preferred || 'kombi' }}"
          echo "runner=$RUNNER" >> "$GITHUB_OUTPUT"
          echo "→ Selected: $RUNNER"
