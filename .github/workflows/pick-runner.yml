# Reusable: Runtime runner selection.
#
# HOW IT WORKS
# ────────────
# The `pick` job runs ON the preferred runner label itself (`oci-build-labs` by
# default). This keeps runner selection on self-hosted capacity and avoids
# spending hosted minutes unless a caller explicitly opts into a hosted runner.
#
# `oci-build-labs` is the shared VM runner label spanning the OCI build host and
# the `srv1161760-labs` overflow runners. `oci-build-core` and
# `oci-build-tools` also exist on the overflow host so queued jobs can spill
# over without changing workflow YAML.
#
# There is still no dynamic hosted fallback chain in this workflow. If every VM
# runner with the requested label is offline, the job queues until capacity
# returns.
#
# To explicitly use another runner class, pass `preferred` from the caller.
# Examples:
# - `oci-build-core`  for SaaS core repos
# - `oci-build-tools` for Stack/Sim/tooling repos
# - `srv1161760-labs` for temporary fallback
# - `ubuntu-latest` only when hosted capacity is intentionally acceptable
#
# NOTE: `kombify-ionos` is the production host — never use it as CI capacity.
name: Pick Runner

on:
  workflow_call:
    inputs:
      preferred:
        description: 'Runner label to use. Defaults to oci-build-labs.'
        required: false
        type: string
        default: 'oci-build-labs'
    secrets:
      GH_PAT:
        required: false
    outputs:
      runner:
        description: 'The selected runner label to use in subsequent jobs'
        value: ${{ jobs.pick.outputs.runner }}

jobs:
  pick:
    name: Select runner
    runs-on: ${{ inputs.preferred || 'oci-build-labs' }}
    timeout-minutes: 3
    outputs:
      runner: ${{ steps.select.outputs.runner }}
    steps:
      - name: Output selected runner
        id: select
        run: |
          RUNNER="${{ inputs.preferred || 'oci-build-labs' }}"
          echo "runner=$RUNNER" >> "$GITHUB_OUTPUT"
          echo "→ Selected: $RUNNER"
