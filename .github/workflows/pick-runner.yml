# Reusable: Runtime runner selection with fallback chain.
#
# HOW IT WORKS
# ────────────
# The bootstrap `pick` job always runs on ubuntu-latest (guaranteed available,
# spends ~10 s of hosted minutes just for runner selection).  It then checks
# which self-hosted runner is online and outputs that label for all subsequent
# jobs — so actual build / deploy work runs on srv1161760-labs (self-hosted,
# zero billed minutes).  If srv1161760 is offline the fallback is ubuntu-latest.
#
# Blacksmith is intentionally NOT in the default chain — it is a paid cloud
# runner service that would be billed to the org.
#
# Chain (default): srv1161760-labs → ubuntu-latest
# NOTE: kombify-ionos is the production host — never add it to this chain.
name: Pick Runner

on:
  workflow_call:
    inputs:
      preferred:
        description: 'Primary runner label (checked first)'
        required: false
        type: string
        default: 'srv1161760-labs'
      fallback:
        description: 'Secondary runner label'
        required: false
        type: string
        default: 'ubuntu-latest'
      last-resort:
        description: 'Final fallback — always available (do not remove)'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      GH_PAT:
        required: false
    outputs:
      runner:
        description: 'The selected runner label to use in subsequent jobs'
        value: ${{ jobs.pick.outputs.runner }}

jobs:
  pick:
    name: Select runner
    # Always runs on ubuntu-latest so the bootstrap itself is guaranteed to
    # execute even when srv1161760 is offline.  Actual build/deploy jobs are
    # dispatched to srv1161760-labs (self-hosted) when it is online.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      runner: ${{ steps.select.outputs.runner }}
    steps:
      - name: Pick first available runner
        id: select
        timeout-minutes: 4
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            const chain = [
              '${{ inputs.preferred }}',
              '${{ inputs.fallback }}',
              '${{ inputs.last-resort }}',
            ].filter(Boolean);

            // Ensure ubuntu-latest is always the final entry (guaranteed fallback)
            if (!chain.includes('ubuntu-latest')) chain.push('ubuntu-latest');

            // Cloud/managed runners are not in the org runner list — treat as always available
            const isCloudRunner = (label) =>
              ['ubuntu-latest', 'ubuntu-24.04', 'ubuntu-22.04', 'ubuntu-20.04',
               'windows-latest', 'macos-latest'].includes(label) ||
              label.startsWith('blacksmith-');

            let selected = 'ubuntu-latest';

            try {
              const { data } = await github.rest.actions.listSelfHostedRunnersForOrg({
                org: context.repo.owner,
                per_page: 100,
              });

              for (const label of chain) {
                if (isCloudRunner(label)) {
                  selected = label;
                  core.info(`→ '${label}' is a cloud runner — selecting`);
                  break;
                }
                const online = data.runners.find(r =>
                  r.status === 'online' &&
                  r.labels.some(l => l.name === label)
                );
                if (online) {
                  selected = label;
                  core.info(`✓ '${label}' is online (${online.name})`);
                  break;
                }
                core.info(`✗ '${label}' is offline — trying next`);
              }
            } catch (err) {
              core.warning(`Runner API error: ${err.message}. Using fallback: '${chain[1] || 'ubuntu-latest'}'.`);
              selected = chain[1] || 'ubuntu-latest';
            }

            core.info(`\n→ Selected: ${selected}`);
            core.setOutput('runner', selected);
