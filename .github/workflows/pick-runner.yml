# Reusable: Runtime runner selection.
#
# HOW IT WORKS
# ────────────
# The `pick` job runs ON the preferred runner label itself (`docker-desktop` by
# default). This targets the two local runners on Marcel's PC.
#
# Runner landscape (2026-03-23):
# - `docker-desktop`    → Marcel's PC (2 runners) — Go builds, Docker builds
# - `hostinger-runner`  → Hostinger VPS — SvelteKit builds, lightweight CI
# - `ubuntu-latest`     → GitHub Hosted fallback (uses minutes, avoid)
#
# OCI runners have been decommissioned (unreliable Docker connectivity).
#
# To explicitly use another runner class, pass `preferred` from the caller.
#
# NOTE: `kombify-ionos` is the production host — never use it as CI capacity.
name: Pick Runner

on:
  workflow_call:
    inputs:
      preferred:
        description: 'Runner label to use. Defaults to docker-desktop.'
        required: false
        type: string
        default: 'docker-desktop'
    secrets:
      GH_PAT:
        required: false
    outputs:
      runner:
        description: 'The selected runner label to use in subsequent jobs'
        value: ${{ jobs.pick.outputs.runner }}

jobs:
  pick:
    name: Select runner
    runs-on: ${{ inputs.preferred || 'docker-desktop' }}
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.select.outputs.runner }}
    steps:
      - name: Output selected runner
        id: select
        run: |
          RUNNER="${{ inputs.preferred || 'docker-desktop' }}"
          echo "runner=$RUNNER" >> "$GITHUB_OUTPUT"
          echo "→ Selected: $RUNNER"
