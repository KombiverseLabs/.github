# kombify Production Health Monitor
# Runs every 15 minutes on the self-hosted runner (zero billed minutes).
# Creates/updates GitHub Issues on failure, auto-closes on recovery.
# Tracks response times and detects degraded performance.
name: Health Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose output'
        required: false
        type: boolean
        default: false

permissions:
  issues: write
  contents: read

jobs:
  check-services:
    # Self-hosted runner → zero GitHub-hosted billed minutes.
    # Falls back to ubuntu-latest only if the runner label is not found.
    runs-on: ${{ vars.BUILD_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    permissions:
      issues: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service:
          # P0 - Critical (revenue/auth impacting)
          - name: 'kombify.space'
            url: 'https://kombify.space'
            expected_ct: 'text/html'
            expected_content: 'kombify'
            smoke_checks: '<html,<script'
            health_endpoint: ''
            priority: 'P0'
            response_warn_ms: 3000
          - name: 'api.kombify.space'
            url: 'https://api.kombify.space'
            expected_ct: ''
            expected_content: ''
            smoke_checks: ''
            health_endpoint: ''
            priority: 'P0'
            response_warn_ms: 2000

          # P1 - Important (core product features)
          - name: 'techstack.kombify.space'
            url: 'https://techstack.kombify.space'
            expected_ct: 'text/html'
            expected_content: ''
            smoke_checks: '<html'
            health_endpoint: ''
            priority: 'P1'
            response_warn_ms: 2000
          - name: 'stack.kombify.space'
            url: 'https://stack.kombify.space'
            expected_ct: 'text/html'
            expected_content: ''
            smoke_checks: '<html'
            health_endpoint: ''
            priority: 'P1'
            response_warn_ms: 3000
          - name: 'blog.kombify.space'
            url: 'https://blog.kombify.space'
            expected_ct: 'text/html'
            expected_content: ''
            smoke_checks: '<html'
            health_endpoint: ''
            priority: 'P1'
            response_warn_ms: 3000

          # P2 - Secondary
          - name: 'simulate.kombify.space'
            url: 'https://simulate.kombify.space'
            expected_ct: 'text/html'
            expected_content: ''
            smoke_checks: '<html'
            health_endpoint: ''
            priority: 'P2'
            response_warn_ms: 5000
          - name: 'sim.kombify.space'
            url: 'https://sim.kombify.space'
            expected_ct: 'text/html'
            expected_content: ''
            smoke_checks: '<html'
            health_endpoint: ''
            priority: 'P2'
            response_warn_ms: 5000

    steps:
      - name: Health check
        id: check
        run: |
          URL="${{ matrix.service.url }}"
          NAME="${{ matrix.service.name }}"
          EXPECTED_CT="${{ matrix.service.expected_ct }}"
          EXPECTED_CONTENT="${{ matrix.service.expected_content }}"
          SMOKE_CHECKS="${{ matrix.service.smoke_checks }}"
          HEALTH_EP="${{ matrix.service.health_endpoint }}"
          WARN_MS="${{ matrix.service.response_warn_ms }}"
          ERRORS=""
          WARNINGS=""

          echo "Checking $NAME at $URL"

          # ── L1: HTTP Reachability + Response Time ──
          START_MS=$(date +%s%3N)
          HTTP_CODE=$(curl -sL -o /tmp/body -w "%{http_code}" "$URL" \
            --max-time 15 --connect-timeout 10 2>/dev/null || echo "000")
          END_MS=$(date +%s%3N)
          RESPONSE_MS=$((END_MS - START_MS))

          echo "response_ms=$RESPONSE_MS" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" = "000" ]; then
            ERRORS="Connection failed (timeout/DNS) after ${RESPONSE_MS}ms"
          elif [ "$HTTP_CODE" -ge 500 ]; then
            ERRORS="HTTP $HTTP_CODE (server error) after ${RESPONSE_MS}ms"
          elif [ "$HTTP_CODE" -ge 400 ]; then
            ERRORS="HTTP $HTTP_CODE after ${RESPONSE_MS}ms"
          else
            echo "  L1: HTTP $HTTP_CODE in ${RESPONSE_MS}ms"
          fi

          # Response time warning
          if [ -z "$ERRORS" ] && [ -n "$WARN_MS" ] && [ "$RESPONSE_MS" -gt "$WARN_MS" ]; then
            WARNINGS="Slow response: ${RESPONSE_MS}ms (threshold: ${WARN_MS}ms)"
            echo "  WARNING: $WARNINGS"
          fi

          # ── L2: Content-Type ──
          if [ -z "$ERRORS" ] && [ -n "$EXPECTED_CT" ]; then
            CT=$(curl -sI -L "$URL" --max-time 10 2>/dev/null | grep -i "^content-type:" | head -1)
            if ! echo "$CT" | grep -qi "$EXPECTED_CT"; then
              ERRORS="Wrong Content-Type: $CT (expected $EXPECTED_CT)"
            fi
          fi

          # ── L3: Content Check ──
          if [ -z "$ERRORS" ] && [ -n "$EXPECTED_CONTENT" ] && [ -f /tmp/body ]; then
            if ! grep -qi "$EXPECTED_CONTENT" /tmp/body; then
              ERRORS="Expected content '$EXPECTED_CONTENT' not found in response"
            fi
          fi

          # ── L4: Health Endpoint ──
          if [ -z "$ERRORS" ] && [ -n "$HEALTH_EP" ]; then
            # Build URL: strip trailing slash from base, prepend endpoint
            BASE_URL=$(echo "$URL" | sed 's:/*$::')
            EP=$(echo "$HEALTH_EP" | sed 's:^/*::')
            HEALTH_URL="$BASE_URL/$EP"
            HEALTH_BODY=$(curl -sf "$HEALTH_URL" --max-time 10 2>/dev/null || echo "")
            if [ -z "$HEALTH_BODY" ]; then
              ERRORS="Health endpoint unreachable: $HEALTH_URL"
            else
              HEALTH_STATUS=$(echo "$HEALTH_BODY" | jq -r '.status // empty' 2>/dev/null || echo "")
              if [ "$HEALTH_STATUS" = "unhealthy" ] || [ "$HEALTH_STATUS" = "degraded" ]; then
                ERRORS="Health endpoint reports $HEALTH_STATUS: $HEALTH_BODY"
              else
                echo "  L4: Health endpoint OK ($HEALTH_STATUS)"
              fi
            fi
          fi

          # ── L5: UI Smoke Test ──
          if [ -z "$ERRORS" ] && [ -n "$SMOKE_CHECKS" ] && [ -f /tmp/body ]; then
            BODY_SIZE=$(wc -c < /tmp/body | tr -d ' ')

            # Check for error pages
            if grep -qi 'Internal Server Error\|500 Error\|Application Error\|INTERNAL_SERVER_ERROR' /tmp/body; then
              ERRORS="UI returned an error page"
            fi

            # Check each smoke marker
            if [ -z "$ERRORS" ]; then
              IFS=',' read -ra MARKERS <<< "$SMOKE_CHECKS"
              for MARKER in "${MARKERS[@]}"; do
                MARKER=$(echo "$MARKER" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                if [ -n "$MARKER" ] && ! grep -qi "$MARKER" /tmp/body; then
                  ERRORS="UI smoke: '$MARKER' not found in response ($BODY_SIZE bytes)"
                  break
                fi
              done
            fi

            if [ -z "$ERRORS" ]; then
              echo "  L5: UI OK ($BODY_SIZE bytes)"
            fi
          fi

          rm -f /tmp/body

          # ── Output Results ──
          if [ -n "$ERRORS" ]; then
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "errors=$ERRORS" >> $GITHUB_OUTPUT
            echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
            echo "::error::$NAME is UNHEALTHY: $ERRORS"
          elif [ -n "$WARNINGS" ]; then
            echo "status=degraded" >> $GITHUB_OUTPUT
            echo "errors=" >> $GITHUB_OUTPUT
            echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
            echo "::warning::$NAME is DEGRADED: $WARNINGS"
          else
            echo "status=healthy" >> $GITHUB_OUTPUT
            echo "errors=" >> $GITHUB_OUTPUT
            echo "warnings=" >> $GITHUB_OUTPUT
            echo "$NAME is healthy (HTTP $HTTP_CODE, ${RESPONSE_MS}ms)"
          fi

          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

      - name: Create or update issue on failure
        if: steps.check.outputs.status == 'unhealthy'
        uses: actions/github-script@v8
        with:
          script: |
            const name = '${{ matrix.service.name }}';
            const priority = '${{ matrix.service.priority }}';
            const errors = `${{ steps.check.outputs.errors }}`;
            const httpCode = '${{ steps.check.outputs.http_code }}';
            const responseMs = '${{ steps.check.outputs.response_ms }}';
            const title = `[HEALTH] ${name} is DOWN`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-alert'
            });

            const existing = issues.find(i => i.title === title);
            const now = new Date().toISOString();

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still down at ${now}\n\nHTTP ${httpCode} (${responseMs}ms): ${errors}`
              });
            } else {
              const body = [
                `## Service Down: ${name}`,
                '',
                `| Detail | Value |`,
                `|--------|-------|`,
                `| **URL** | ${{ matrix.service.url }} |`,
                `| **Priority** | ${priority} |`,
                `| **HTTP Code** | ${httpCode} |`,
                `| **Response Time** | ${responseMs}ms |`,
                `| **Error** | ${errors} |`,
                `| **Detected** | ${now} |`,
                '',
                '### Recovery Steps',
                '1. SSH to VPS: `ssh kombify-hostinger`',
                '2. Check containers: `docker ps --filter name=' + name.split('.')[0] + '`',
                '3. Check logs: `docker logs --tail 50 kombify-' + name.split('.')[0] + '`',
                '4. Restart service: `docker restart kombify-' + name.split('.')[0] + '`',
                '5. Re-trigger deploy from GitHub Actions if needed',
              ].join('\n');

              const labels = ['health-alert'];
              if (priority === 'P0') labels.push('priority-critical');
              else if (priority === 'P1') labels.push('priority-high');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels
              });
            }

      - name: Auto-close issue on recovery
        if: steps.check.outputs.status == 'healthy' || steps.check.outputs.status == 'degraded'
        uses: actions/github-script@v8
        with:
          script: |
            const name = '${{ matrix.service.name }}';
            const title = `[HEALTH] ${name} is DOWN`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-alert'
            });

            const existing = issues.find(i => i.title === title);
            if (existing) {
              const responseMs = '${{ steps.check.outputs.response_ms }}';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Recovered at ${new Date().toISOString()} (${responseMs}ms)`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }

  summary:
    runs-on: ${{ vars.BUILD_RUNNER || 'ubuntu-latest' }}
    needs: check-services
    if: always()
    permissions:
      contents: read
    steps:
      - name: Generate summary
        run: |
          echo "### Health Monitor Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          RESULT="${{ needs.check-services.result }}"
          if [ "$RESULT" = "success" ]; then
            echo "All services healthy." >> $GITHUB_STEP_SUMMARY
          else
            echo "**One or more services are unhealthy.** Check individual job logs." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Run at $(date -u '+%Y-%m-%d %H:%M:%S UTC')_" >> $GITHUB_STEP_SUMMARY
