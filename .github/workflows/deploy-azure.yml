# Reusable workflow: Deploy to Azure Container Apps
# Wraps the common Azure deployment pattern used across kombify repos
name: Deploy to Azure Container Apps

on:
  workflow_call:
    inputs:
      resource-group:
        description: 'Azure resource group'
        required: false
        type: string
        default: 'rg-kombify-prod'
      container-app-name:
        description: 'Azure Container App name'
        required: true
        type: string
      container-app-env:
        description: 'Azure Container App Environment name'
        required: false
        type: string
        default: 'cae-kombify-prod'
      image:
        description: 'Full image reference (registry/name:tag)'
        required: true
        type: string
      env-vars:
        description: 'Environment variables (space-separated KEY=VALUE pairs)'
        required: false
        type: string
        default: ''
      health-check-path:
        description: 'Health check endpoint path'
        required: false
        type: string
        default: '/health'
      min-replicas:
        description: 'Minimum replicas'
        required: false
        type: number
        default: 1
      max-replicas:
        description: 'Maximum replicas'
        required: false
        type: number
        default: 3
      cpu:
        description: 'CPU allocation'
        required: false
        type: string
        default: '0.5'
      memory:
        description: 'Memory allocation'
        required: false
        type: string
        default: '1.0Gi'
      target-port:
        description: 'Container port'
        required: false
        type: number
        default: 8080
      rollback-on-failure:
        description: 'Rollback to previous revision if health check fails'
        required: false
        type: boolean
        default: true
      keyvault-name:
        description: 'Azure Key Vault name for secrets (empty to skip)'
        required: false
        type: string
        default: ''
      keyvault-secrets:
        description: 'Key Vault secret names to fetch (space-separated)'
        required: false
        type: string
        default: ''
      expected-content-type:
        description: 'Expected Content-Type for verification (e.g., text/html)'
        required: false
        type: string
        default: ''
      expected-content:
        description: 'Expected body content for verification (case-insensitive)'
        required: false
        type: string
        default: ''
      version-endpoint:
        description: 'Path to version endpoint for L4 verification (e.g., /api/health)'
        required: false
        type: string
        default: ''
    secrets:
      AZURE_CREDENTIALS:
        required: true
      ACR_USERNAME:
        required: false
      ACR_PASSWORD:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ contains(inputs.container-app-name, 'prod') && 'production' || 'staging' }}
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps extension
        run: |
          az extension add --name containerapp --upgrade --yes 2>/dev/null || true

      - name: Save current revision (for rollback)
        if: inputs.rollback-on-failure
        id: current
        run: |
          REVISION=$(az containerapp show \
            --name ${{ inputs.container-app-name }} \
            --resource-group ${{ inputs.resource-group }} \
            --query "properties.latestRevisionName" -o tsv 2>/dev/null || echo "none")
          echo "revision=$REVISION" >> $GITHUB_OUTPUT
          echo "Current revision: $REVISION"

      - name: Fetch Key Vault secrets
        if: inputs.keyvault-name != ''
        id: secrets
        uses: Azure/get-keyvault-secrets@v1
        with:
          keyvault: ${{ inputs.keyvault-name }}
          secrets: ${{ inputs.keyvault-secrets }}

      - name: Update Container App
        run: |
          # Build env-vars argument
          ENV_ARGS=""
          if [ -n "${{ inputs.env-vars }}" ]; then
            # Evaluate the env-vars string to expand KeyVault secrets exported as env vars
            # Note: Azure/get-keyvault-secrets converts hyphens to underscores in env var names.
            # So a secret like "database-url" becomes $database_url
            EVALUATED_VARS=$(echo "${{ inputs.env-vars }}" | envsubst)
            ENV_ARGS="--set-env-vars $EVALUATED_VARS"
          fi

          echo "Updating Container App..."
          # Note: This executes the command. We don't echo secrets in logs.
          az containerapp update \
            --name ${{ inputs.container-app-name }} \
            --resource-group ${{ inputs.resource-group }} \
            --image ${{ inputs.image }} \
            --min-replicas ${{ inputs.min-replicas }} \
            --max-replicas ${{ inputs.max-replicas }} \
            --cpu ${{ inputs.cpu }} \
            --memory ${{ inputs.memory }} \
            $ENV_ARGS

      - name: Get FQDN
        id: fqdn
        run: |
          FQDN=$(az containerapp show \
            --name ${{ inputs.container-app-name }} \
            --resource-group ${{ inputs.resource-group }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT
          echo "FQDN: $FQDN"

      - name: Checkout (for composite action)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/.github
          path: .github-actions
          sparse-checkout: actions/verify-deployment

      - name: Deep verification (L1-L4)
        id: health
        uses: ./.github-actions/actions/verify-deployment
        with:
          url: https://${{ steps.fqdn.outputs.fqdn }}${{ inputs.health-check-path }}
          expected-content-type: ${{ inputs.expected-content-type }}
          expected-content: ${{ inputs.expected-content }}
          version-endpoint: ${{ inputs.version-endpoint }}
          version-sha: ${{ github.sha }}
          max-retries: '10'
          retry-delay: '10'
        continue-on-error: true

      - name: Rollback on failure
        if: inputs.rollback-on-failure && steps.health.outcome == 'failure' && steps.current.outputs.revision != 'none'
        run: |
          echo "::warning::Rolling back to previous revision: ${{ steps.current.outputs.revision }}"
          az containerapp revision activate \
            --name ${{ inputs.container-app-name }} \
            --resource-group ${{ inputs.resource-group }} \
            --revision ${{ steps.current.outputs.revision }}

      - name: Fail if unhealthy
        if: steps.health.outcome == 'failure'
        run: |
          echo "::error::Deployment verification failed. Rollback executed."
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "### Azure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Container App** | \`${{ inputs.container-app-name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ inputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **FQDN** | \`${{ steps.fqdn.outputs.fqdn }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
