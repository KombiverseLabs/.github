name: Feature Flag Release Gate
description: |
  Check that all required feature flags for a tool category are in the
  expected release phase before promoting an image to production.

  Talks to the existing kombify-Administration release-manifest endpoint:
    GET https://admin.kombify.io/api/v1/feature-flags/release-manifest?category=<tool>

  See:
    - kombify-Administration/frontend/src/routes/api/v1/feature-flags/release-manifest/+server.ts
    - kombify Core/standards/FEATURE-FLAGS-STANDARD.md
    - kombify Core/standards/MODULAR-RELEASE-STRATEGY.md

  Auth (two paths, in priority order):
    1. Preferred: service-auth-secret. The action mints a short-lived (5min)
       HS256 JWT signed with SERVICE_AUTH_SECRET (Doppler kombify-io/prd_admin)
       and sends it via X-Kombify-Service-Auth, validated by Admin's
       tryServiceAuth(). Stateless, no long-lived bearer tokens.
    2. Legacy: service-key. A pre-signed token compared against ADMIN_SERVICE_KEY
       (Doppler kombify-io/prd_admin) via Authorization: Bearer. Kept for
       backward compatibility — prefer path 1 for new pipelines.

inputs:
  category:
    description: |
      Feature category in the Admin DB (e.g. "kombify-ai", "kombify-sim",
      "kombify-cloud"). Maps to `feature_definitions.tool` column.
    required: true
  required-flags:
    description: |
      Optional JSON array of flag keys that MUST be `released: true`. When
      empty, the action only fails if any flag in the category has
      releasePhase="released" but is not currently live (kill-switch
      detection). When set, all listed flags must be released — failures
      list each missing flag.
    required: false
    default: "[]"
  service-auth-secret:
    description: |
      Preferred. SERVICE_AUTH_SECRET (HMAC) shared with kombify-Administration.
      Doppler key: `SERVICE_AUTH_SECRET` in `kombify-io/prd_admin`. The action
      mints a short-lived HS256 JWT and sends it via X-Kombify-Service-Auth.
      Either this or `service-key` must be set.
    required: false
    default: ""
  caller-name:
    description: |
      Service name used as `iss`/`svc` claim of the minted JWT (only relevant
      when service-auth-secret is set). Must be present in
      SERVICE_AUTH_ALLOWED_CALLERS on the Admin side. Defaults to "ai".
    required: false
    default: "ai"
  service-key:
    description: |
      Legacy. Pre-signed shared key (HS256 JWT or static token) compared
      against ADMIN_SERVICE_KEY on the Admin side. Doppler key:
      `ADMIN_SERVICE_KEY` in `kombify-io/prd_admin`. Either this or
      `service-auth-secret` must be set; if both are set, service-auth-secret
      wins.
    required: false
    default: ""
  admin-base-url:
    description: Admin API base URL.
    required: false
    default: "https://admin.kombify.io"
  bypass-fragile:
    description: |
      Set to "true" only for true emergencies. Skips the gate but writes a
      bypass-audit log line that surfaces in Sentry / GitHub Step Summary.
      Default "false" — gate is enforced.
    required: false
    default: "false"

outputs:
  manifest-checked-at:
    description: ISO timestamp at which the manifest was retrieved.
    value: ${{ steps.gate.outputs.checked-at }}
  released-flags:
    description: JSON array of flag keys that are currently released for this category.
    value: ${{ steps.gate.outputs.released-flags }}

runs:
  using: composite
  steps:
    - name: Validate auth inputs and mask
      shell: bash
      env:
        SERVICE_AUTH_SECRET: ${{ inputs.service-auth-secret }}
        SERVICE_KEY: ${{ inputs.service-key }}
      run: |
        if [ -z "${SERVICE_AUTH_SECRET:-}" ] && [ -z "${SERVICE_KEY:-}" ]; then
          echo "::error::Either service-auth-secret (preferred, from SERVICE_AUTH_SECRET) or service-key (legacy ADMIN_SERVICE_KEY) must be set." >&2
          exit 1
        fi
        if [ -n "${SERVICE_AUTH_SECRET:-}" ]; then
          echo "::add-mask::${SERVICE_AUTH_SECRET}"
        fi
        if [ -n "${SERVICE_KEY:-}" ]; then
          echo "::add-mask::${SERVICE_KEY}"
        fi

    - name: Bypass with audit log
      if: inputs.bypass-fragile == 'true'
      shell: bash
      run: |
        echo "::warning::FF release gate BYPASSED for category=${{ inputs.category }}. Emergency escape hatch — every bypass MUST be reviewed in the next standup and tracked as a Beads issue." >&2
        {
          echo "## ⚠️ Feature Flag Gate Bypassed"
          echo ""
          echo "**Category:** ${{ inputs.category }}"
          echo "**Repo:** ${{ github.repository }}"
          echo "**Run:** ${{ github.run_id }}"
          echo "**Actor:** ${{ github.actor }}"
          echo "**Reason:** bypass-fragile=true"
          echo ""
          echo "Open a Beads issue in the owning repo with the rationale."
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Run release gate
      id: gate
      if: inputs.bypass-fragile != 'true'
      shell: bash
      env:
        ADMIN_BASE_URL: ${{ inputs.admin-base-url }}
        CATEGORY: ${{ inputs.category }}
        REQUIRED_FLAGS: ${{ inputs.required-flags }}
        SERVICE_AUTH_SECRET: ${{ inputs.service-auth-secret }}
        SERVICE_KEY: ${{ inputs.service-key }}
        CALLER_NAME: ${{ inputs.caller-name }}
      run: |
        set -euo pipefail
        if ! command -v jq >/dev/null 2>&1; then
          sudo apt-get update -qq && sudo apt-get install -y jq
        fi

        # base64url helper (no padding) — preserves binary fidelity for HMAC sig.
        b64url() {
          # Reads stdin, emits base64url with padding stripped.
          base64 -w 0 | tr '+/' '-_' | tr -d '='
        }

        # Build Authorization header.
        # Path 1 (preferred): mint short-lived HS256 JWT with SERVICE_AUTH_SECRET.
        # Path 2 (legacy): pass SERVICE_KEY as Authorization: Bearer.
        if [ -n "${SERVICE_AUTH_SECRET:-}" ]; then
          # Doppler sometimes stores values with trailing whitespace/CR.
          # Admin's tryServiceAuth() does env.SERVICE_AUTH_SECRET?.trim()
          # before HMAC verification, so we MUST trim here too — otherwise
          # the signing key differs and the JWT signature will not verify.
          SERVICE_AUTH_SECRET=$(printf '%s' "$SERVICE_AUTH_SECRET" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$SERVICE_AUTH_SECRET" ]; then
            echo "::error::SERVICE_AUTH_SECRET is empty after trim — check the Doppler value." >&2
            exit 1
          fi
          NOW=$(date +%s)
          EXP=$((NOW + 300))
          HEADER_JSON='{"alg":"HS256","typ":"JWT"}'
          # Admin's tryServiceAuth() requires:
          #   - aud == "kombify-administration"
          #   - svc in SERVICE_AUTH_ALLOWED_CALLERS (default: cloud,ai,sim,techstack,stackkits,admin-jobs)
          PAYLOAD_JSON=$(jq -nc \
            --arg iss "kombify-${CALLER_NAME}" \
            --arg aud "kombify-administration" \
            --arg svc "${CALLER_NAME}" \
            --argjson iat "${NOW}" \
            --argjson exp "${EXP}" \
            '{iss:$iss, aud:$aud, svc:$svc, iat:$iat, exp:$exp}')
          HEADER_B64=$(printf '%s' "$HEADER_JSON" | b64url)
          PAYLOAD_B64=$(printf '%s' "$PAYLOAD_JSON" | b64url)
          SIGNING_INPUT="${HEADER_B64}.${PAYLOAD_B64}"
          SIG_B64=$(printf '%s' "$SIGNING_INPUT" \
            | openssl dgst -sha256 -hmac "$SERVICE_AUTH_SECRET" -binary \
            | b64url)
          JWT="${SIGNING_INPUT}.${SIG_B64}"
          echo "::add-mask::$JWT"
          AUTH_HEADER="X-Kombify-Service-Auth: $JWT"
          echo "Auth: minted HS256 service-auth JWT (svc=${CALLER_NAME}, ttl=300s)"
        else
          AUTH_HEADER="Authorization: Bearer $SERVICE_KEY"
          echo "Auth: legacy ADMIN_SERVICE_KEY bearer"
        fi

        URL="${ADMIN_BASE_URL%/}/api/v1/feature-flags/release-manifest?category=${CATEGORY}"
        echo "GET $URL"

        HTTP_CODE=$(curl -sS -o /tmp/ff-manifest.json -w "%{http_code}" \
          -H "$AUTH_HEADER" \
          -H "Accept: application/json" \
          --max-time 20 \
          --retry 3 --retry-delay 2 --retry-connrefused \
          "$URL" || true)

        if [ "$HTTP_CODE" != "200" ]; then
          echo "::error::Admin release-manifest endpoint returned HTTP $HTTP_CODE." >&2
          echo "Response body:" >&2
          cat /tmp/ff-manifest.json >&2 || true
          exit 1
        fi

        CHECKED_AT=$(jq -r '.generated_at // "unknown"' /tmp/ff-manifest.json)
        echo "checked-at=$CHECKED_AT" >> "$GITHUB_OUTPUT"

        RELEASED_FLAGS=$(jq -c '[.features | to_entries[] | select(.value.released == true) | .key]' /tmp/ff-manifest.json)
        echo "released-flags=$RELEASED_FLAGS" >> "$GITHUB_OUTPUT"

        # 1. Required flags check (when caller provided a list).
        REQUIRED_COUNT=$(echo "$REQUIRED_FLAGS" | jq 'length')
        if [ "$REQUIRED_COUNT" -gt 0 ]; then
          MISSING=$(jq -r --argjson required "$REQUIRED_FLAGS" '
            [$required[] as $k | select((.features[$k]? // {released:false}).released != true) | $k] | .[]
          ' /tmp/ff-manifest.json | tr "\n" " " | sed "s/ $//" || true)
          if [ -n "${MISSING:-}" ]; then
            echo "::error::Required feature flags missing or not released for category=$CATEGORY: $MISSING" >&2
            echo "Block reason: caller passed required-flags but the Admin manifest does not list them as released." >&2
            exit 1
          fi
        fi

        # 2. Kill-switch detection: any flag with phase=released that is NOT currently
        #    "released:true" in the manifest. (released phase implies live.)
        # The manifest already maps phase→released boolean, so we just verify there are no
        # category flags marked released:false that should be live. This is a sanity check,
        # not a hard fail by default — the manifest should not surface released:false for a
        # released-phase flag at all. If it does, it indicates DB drift or a kill-switch
        # action by an admin.
        DRIFT=$(jq -r '
          .features
          | to_entries
          | map(select(.value.released == false and (.value.module_paths // []) != []))
          | length
        ' /tmp/ff-manifest.json)
        if [ "$DRIFT" -gt 0 ]; then
          echo "::warning::Detected $DRIFT feature flag(s) with module_paths but released=false. May indicate an active kill-switch. Review before promoting." >&2
        fi

        {
          echo "### Feature Flag Gate"
          echo ""
          echo "**Category:** $CATEGORY"
          echo "**Manifest fetched at:** $CHECKED_AT"
          echo "**Released flags:** \`$RELEASED_FLAGS\`"
          if [ "$REQUIRED_COUNT" -gt 0 ]; then
            echo "**Required flags:** \`$REQUIRED_FLAGS\` ✅"
          fi
          if [ "$DRIFT" -gt 0 ]; then
            echo "**Drift warnings:** $DRIFT flag(s) with module_paths but released=false."
          fi
        } >> "$GITHUB_STEP_SUMMARY"
